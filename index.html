<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Projekt: Mein digitales Ich</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
        }
    }
    </script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Fredoka:wght@500;600;700&display=swap');
        
        body { margin: 0; background-color: #eef2ff; overscroll-behavior-y: none; }
        * { font-family: 'Nunito', sans-serif !important; -webkit-tap-highlight-color: transparent; }
        .font-title { font-family: 'Fredoka', sans-serif !important; }

        .next-level-glow {
          animation: superPulse 2s infinite ease-in-out;
          z-index: 10;
        }
        @keyframes superPulse {
          0%, 100% { box-shadow: 0 0 15px rgba(99, 102, 241, 0.4); border-color: rgba(99, 102, 241, 0.6); transform: scale(1); }
          50% { box-shadow: 0 0 25px rgba(99, 102, 241, 0.7); border-color: rgba(99, 102, 241, 0.9); transform: scale(1.02); }
        }
        
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #a5b4fc; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #818cf8; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          User, Monitor, Image as ImageIcon, CheckCircle, PlayCircle, Lock, Unlock,
          Edit3, Shield, Award, Smile, BookOpen, PenTool, Check, 
          AlertTriangle, MessageSquare, Camera, ThumbsUp, ThumbsDown, 
          ShieldAlert, Key, ChevronLeft, EyeOff, Fingerprint, FileText, Download,
          ExternalLink, HelpCircle, Lightbulb
        } from 'lucide-react';

        // --- HILFSKOMPONENTEN ---
        const Highlight = ({ children, color="text-indigo-600 bg-indigo-100" }) => (
          <strong className={`${color} font-bold px-2 py-0.5 rounded-lg inline-block my-1 shadow-sm`}>{children}</strong>
        );

        const Button = ({ onClick, children, variant = 'primary', disabled = false, className = "", icon: Icon }) => {
          const variants = {
            primary: "bg-indigo-500 text-white border-indigo-600 hover:bg-indigo-600 shadow-indigo-200",
            secondary: "bg-white text-indigo-600 border-indigo-200 hover:bg-indigo-50 shadow-slate-200",
            success: "bg-emerald-500 text-white border-emerald-600 hover:bg-emerald-600 shadow-emerald-200",
            danger: "bg-rose-500 text-white border-rose-600 hover:bg-rose-600 shadow-rose-200",
            amber: "bg-amber-400 text-amber-900 border-amber-500 hover:bg-amber-500 shadow-amber-200",
            sky: "bg-sky-500 text-white border-sky-600 hover:bg-sky-600 shadow-sky-200"
          };
          return (
            <button onClick={onClick} disabled={disabled} className={`w-full py-4 px-6 rounded-2xl font-bold text-lg flex items-center justify-center gap-3 active:scale-95 disabled:opacity-60 disabled:scale-100 shadow-[0_4px_0_0] focus:outline-none transition-all ${variants[variant].split(' ')[0]} ${variants[variant].split(' ')[1]} border-b-4 ${variants[variant].split(' ')[2]} ${variants[variant].split(' ')[3]} shadow-sm ${className}`}>
              {Icon && <Icon size={24} />} {children}
            </button>
          );
        };

        const Background = () => (
          <div className="fixed inset-0 z-0 bg-indigo-50/50 overflow-hidden pointer-events-none">
            <div className="absolute top-[-10%] left-[-10%] w-[60vw] h-[60vw] bg-violet-200/40 rounded-full blur-[120px]"></div>
            <div className="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] bg-indigo-200/40 rounded-full blur-[100px]"></div>
            <div className="absolute top-[40%] right-[10%] w-[30vw] h-[30vw] bg-fuchsia-100/40 rounded-full blur-[80px]"></div>
          </div>
        );

        const Box = ({ children, title, icon: Icon, color="indigo" }) => {
            const colors = {
                indigo: "border-indigo-200 bg-white text-indigo-800 shadow-indigo-100",
                emerald: "border-emerald-200 bg-white text-emerald-800 shadow-emerald-100",
                amber: "border-amber-200 bg-white text-amber-900 shadow-amber-100",
                rose: "border-rose-200 bg-white text-rose-800 shadow-rose-100",
                sky: "border-sky-200 bg-white text-sky-800 shadow-sky-100",
            };
            return (
                <div className={`p-6 sm:p-8 rounded-3xl border-2 ${colors[color].split(' ')[0]} ${colors[color].split(' ')[1]} mb-6 relative shadow-lg ${colors[color].split(' ')[3]} animate-fade-in`}>
                    {title && (
                        <div className={`flex items-center gap-4 mb-6 pb-4 border-b-2 border-slate-100 ${colors[color].split(' ')[2]}`}>
                            {Icon && <div className={`p-3 rounded-2xl ${colors[color].split(' ')[0].replace('border-', 'bg-').replace('200', '100')} text-current`}><Icon size={32} /></div>}
                            <h3 className="text-2xl sm:text-3xl font-bold font-title text-slate-800 leading-tight">{title}</h3>
                        </div>
                    )}
                    <div className="text-[1.15rem] text-slate-600 leading-relaxed space-y-4">
                        {children}
                    </div>
                </div>
            );
        };

        // --- LEHRER LOGIN MODAL ---
        const TeacherModal = ({ isOpen, onClose, onGlobalUnlock, onSkipCurrent }) => {
            const [code, setCode] = useState("");
            if (!isOpen) return null;

            const handleSubmit = () => {
                if (code === "KleallesFrei") {
                    onGlobalUnlock();
                    onClose();
                } else if (code === "Kleskip") {
                    onSkipCurrent();
                    onClose();
                } else {
                    alert("Falscher Code!");
                }
                setCode("");
            };

            return (
                <div className="fixed inset-0 z-[600] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                    <div className="bg-white p-8 rounded-3xl border-2 border-slate-200 shadow-2xl max-w-sm w-full animate-fade-in">
                        <h3 className="text-2xl font-bold font-title text-slate-800 mb-6 flex items-center gap-3"><Key className="text-indigo-500"/> Lehrer-Login</h3>
                        <p className="text-slate-600 mb-6 font-medium text-sm">Bitte gib den geheimen Lehrercode ein.</p>
                        <input type="password" value={code} onChange={e=>setCode(e.target.value)} placeholder="Code eingeben..." className="w-full bg-slate-50 border-2 border-slate-200 rounded-xl p-4 text-xl outline-none focus:border-indigo-500 mb-8 font-mono" />
                        <div className="flex gap-4">
                            <Button onClick={handleSubmit} variant="primary">OK</Button>
                            <Button onClick={onClose} variant="secondary">Zurück</Button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- SCREENS ---
        const WelcomeScreen = ({ onStart }) => (
            <div className="min-h-screen flex items-center justify-center p-4 sm:p-6 relative z-10">
                <div className="w-full max-w-2xl bg-white/95 backdrop-blur-xl p-8 sm:p-12 rounded-[2.5rem] border-4 border-indigo-100 shadow-2xl text-center">
                    <div className="bg-gradient-to-br from-indigo-500 to-violet-500 w-28 h-28 sm:w-32 sm:h-32 rounded-[2rem] flex items-center justify-center mx-auto mb-8 shadow-xl rotate-3 hover:rotate-0 transition-transform">
                        <Smile size={64} className="text-white" />
                    </div>
                    <h1 className="text-5xl sm:text-6xl font-title font-black text-indigo-600 mb-6 drop-shadow-sm leading-tight">Mein digitales Ich</h1>
                    <p className="text-xl sm:text-2xl text-slate-600 mb-10 font-medium px-4 leading-relaxed">
                        Willkommen zum Avatar-Projekt!<br/> 
                        Setzt euch zu zweit an ein Tablet oder einen PC und bearbeitet die Level gemeinsam.
                    </p>
                    <Button onClick={onStart} icon={PlayCircle} className="text-2xl py-5 sm:py-6 rounded-3xl">Projekt starten!</Button>
                </div>
            </div>
        );

        const MenuScreen = ({ unlocked, onSelect }) => {
            const levels = [
                { id: 1, title: "Dein digitales Schutzschild", icon: Shield, color: "indigo" },
                { id: 2, title: "Avatar erstellen", icon: PenTool, color: "emerald" }
            ];

            return (
                <div className="w-full max-w-4xl mx-auto p-4 sm:p-6 pt-6 sm:pt-12 relative z-10 animate-fade-in">
                    <div className="flex items-center justify-between bg-white p-6 sm:p-8 rounded-3xl border-2 border-indigo-100 mb-8 shadow-md">
                        <div className="flex items-center gap-4 sm:gap-6">
                            <div className="p-4 bg-indigo-100 rounded-2xl text-indigo-600">
                                <Award size={40} />
                            </div>
                            <div>
                                <h2 className="text-3xl sm:text-4xl font-title font-bold text-slate-800">Level-Übersicht</h2>
                                <p className="text-slate-500 text-lg sm:text-xl mt-1 font-medium">Löst die Missionen nacheinander.</p>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 gap-5 sm:gap-6">
                        {levels.map(l => {
                            const isUnlocked = l.id <= unlocked;
                            const isNext = l.id === unlocked;
                            let borderCol = isUnlocked ? (isNext ? 'border-indigo-400' : 'border-slate-200') : 'border-slate-100';
                            let bgCol = isUnlocked ? 'bg-white hover:bg-slate-50 active:bg-slate-100 shadow-md' : 'bg-slate-50 opacity-70';
                            
                            return (
                                <button key={l.id} onClick={() => isUnlocked && onSelect(l.id)} className={`p-5 sm:p-6 rounded-[2rem] border-4 flex items-center gap-5 sm:gap-8 transition-all text-left ${bgCol} ${borderCol} ${isNext ? 'next-level-glow' : ''}`}>
                                    <div className={`w-20 h-20 sm:w-24 sm:h-24 rounded-3xl flex items-center justify-center shrink-0 border-4 ${isUnlocked ? (isNext ? `bg-${l.color}-500 border-${l.color}-300 text-white shadow-lg` : 'bg-slate-100 border-slate-200 text-slate-500') : 'bg-slate-100 border-slate-200 text-slate-400'}`}>
                                        <l.icon size={isNext ? 40 : 36} />
                                    </div>
                                    <div className="flex-1">
                                        <p className="text-sm sm:text-base font-bold text-slate-400 uppercase tracking-widest mb-1 sm:mb-2">Level {l.id}</p>
                                        <h3 className={`text-2xl sm:text-3xl font-bold font-title ${isUnlocked ? 'text-slate-800' : 'text-slate-400'}`}>{l.title}</h3>
                                    </div>
                                    {!isUnlocked && <div className="p-4 bg-slate-200 rounded-2xl"><Lock className="text-slate-400" size={32} /></div>}
                                    {isUnlocked && !isNext && <div className="p-4 bg-emerald-100 rounded-2xl"><CheckCircle className="text-emerald-500" size={32} /></div>}
                                </button>
                            )
                        })}
                    </div>
                </div>
            );
        };

        // --- LEVEL 1: AVATARE & DATENSCHUTZ ---
        const Level1 = ({ onComplete, isTeacher, skipSignal }) => {
            const [step, setStep] = useState(0);
            const [feedback, setFeedback] = useState(null);

            // Timer states für die Inline-Aufgaben
            const [heftWait, setHeftWait] = useState(60);
            const [checkWait, setCheckWait] = useState(60);
            const [showHeftError, setShowHeftError] = useState(false);
            const [showCheckError, setShowCheckError] = useState(false);

            const [avatarGameIndex, setAvatarGameIndex] = useState(0);
            
            const avatarGameItems = [
                { img: "https://api.dicebear.com/7.x/adventurer/svg?seed=Felix", isAvatar: true },
                { img: "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=400&q=80", isAvatar: false },
                { img: "https://api.dicebear.com/7.x/bottts/svg?seed=Robot", isAvatar: true },
                { img: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=400&q=80", isAvatar: false },
                { img: "https://images.unsplash.com/photo-1618401471353-b98afee0b2eb?w=400&q=80", isAvatar: true },
                { img: "https://images.unsplash.com/photo-1510832198440-a52376950479?w=400&q=80", isAvatar: false },
                { img: "https://api.dicebear.com/7.x/micah/svg?seed=Memoji", isAvatar: true }
            ];

            const [sortingCards, setSortingCards] = useState([
                { text: "Dein Lieblingstier", isSafe: true },
                { text: "Deine genaue Wohnadresse", isSafe: false },
                { text: "Dein voller echter Name", isSafe: false },
                { text: "Dein selbstgemachter Avatar", isSafe: true },
                { text: "Ein echtes Foto von dir vor deinem Haus", isSafe: false },
                { text: "Deine Lieblingsfarbe", isSafe: true },
                { text: "Dein Passwort für das Schul-Tablet", isSafe: false },
                { text: "Dein aktueller Standort (wo du gerade bist)", isSafe: false }
            ]);
            const [currentSortIdx, setCurrentSortIdx] = useState(0);

            useEffect(() => {
                if (skipSignal > 0) {
                    if (step === 0) setStep(1);
                    else if (step === 1) setStep(2);
                    else if (step === 2) setStep(3);
                    else if (step === 3) setStep(4);
                    else if (step === 4) setStep(5);
                    else if (step === 5) setStep(6);
                    else if (step === 6) { setHeftWait(0); setStep(7); }
                    else if (step === 7) { setCheckWait(0); onComplete(); }
                }
            }, [skipSignal]);

            useEffect(() => {
                let t;
                if (step === 6 && heftWait > 0 && !isTeacher) {
                    t = setInterval(() => setHeftWait(p => p - 1), 1000);
                } else if (step === 7 && checkWait > 0 && !isTeacher) {
                    t = setInterval(() => setCheckWait(p => p - 1), 1000);
                }
                return () => clearInterval(t);
            }, [step, heftWait, checkWait, isTeacher]);


            const showFeedback = (isOk, text) => {
                setFeedback({ ok: isOk, msg: text });
                setTimeout(() => setFeedback(null), 2500);
            };

            const handleAvatarGame = (choseAvatar) => {
                const item = avatarGameItems[avatarGameIndex];
                if (choseAvatar === item.isAvatar) {
                    setFeedback({ ok: true, msg: "Richtig erkannt!" });
                    setTimeout(() => {
                        setFeedback(null);
                        if (avatarGameIndex < avatarGameItems.length - 1) setAvatarGameIndex(i => i + 1);
                        else setStep(s => s + 1);
                    }, 1500);
                } else {
                    showFeedback(false, "Falsch! Schau genau hin, ob es ein echter Mensch oder eine Computergrafik ist.");
                }
            };

            const handleSort = (choseSafe) => {
                const item = sortingCards[currentSortIdx];
                if (choseSafe === item.isSafe) {
                    setFeedback({ ok: true, msg: "Korrekt einsortiert!" });
                    setTimeout(() => {
                        setFeedback(null);
                        if (currentSortIdx < sortingCards.length - 1) setCurrentSortIdx(i => i + 1);
                        else setStep(s => s + 1);
                    }, 1500);
                } else {
                    showFeedback(false, "Vorsicht! Überlege genau, ob diese Info Fremde im Netz etwas angeht.");
                }
            };

            const handleScenario = (goodChoice) => {
                if (goodChoice) {
                    showFeedback(true, "Sehr gut! Du weißt, wie man sich im Internet sicher verhält.");
                    setTimeout(() => { setFeedback(null); setStep(s => s+1); }, 2000);
                } else {
                    showFeedback(false, "Achtung Gefahr! Fremden schickt man niemals echte Bilder von sich.");
                }
            };

            const handleHeftSubmit = () => {
                if (heftWait > 0 && !isTeacher) {
                    setShowHeftError(true);
                    setTimeout(() => setShowHeftError(false), 3000);
                } else {
                    setStep(7);
                    window.scrollTo(0,0);
                }
            };

            const handleCheckSubmit = () => {
                if (checkWait > 0 && !isTeacher) {
                    setShowCheckError(true);
                    setTimeout(() => setShowCheckError(false), 3000);
                } else {
                    onComplete(); 
                }
            };

            return (
                <div className="w-full max-w-5xl mx-auto p-4 sm:p-6 relative z-10 animate-fade-in">
                    
                    {/* Step 0: Intro */}
                    {step === 0 && (
                        <Box title="Identitätsdiebstahl" icon={EyeOff} color="indigo">
                            <p>Stellt euch vor, ihr spielt ein neues Online-Spiel. Das Spiel fragt euch nach einem Bild für euer Profil, damit andere Spieler euch erkennen können.</p>
                            
                            <div className="bg-rose-50 p-6 rounded-3xl border-2 border-rose-200 mt-6 flex flex-col sm:flex-row gap-5 items-start sm:items-center shadow-sm">
                                <div className="bg-rose-200 p-4 rounded-full text-rose-600 shrink-0"><ShieldAlert size={36} /></div>
                                <div>
                                    <p className="text-rose-800 font-bold text-xl mb-1">Achtung: Gefahr für deine Daten!</p>
                                    <p className="text-rose-700 text-lg">Ein echtes Foto von sich selbst hochzuladen, ist gefährlich. Fremde können das Foto kopieren, damit Unsinn machen oder herausfinden, wer ihr wirklich seid.</p>
                                </div>
                            </div>

                            <p className="mt-8 text-xl">Die geniale Lösung dafür heißt: <Highlight>Der Avatar!</Highlight></p>
                            <p>Ein Avatar ist eine künstliche, erfundene digitale Figur. Sie vertritt dich im Internet, wie eine Spielfigur. Sie kann aussehen wie du, oder ganz verrückt wie ein lila Alien!</p>
                            
                            <Button onClick={() => setStep(1)} className="mt-8">Verstanden, weiter!</Button>
                        </Box>
                    )}

                    {/* Step 1: Avatar vs Real Game */}
                    {step === 1 && (
                        <Box title="Spiel: Avatar oder Echtes Foto?" icon={Camera} color="amber">
                            <p className="mb-6 font-bold text-amber-800 text-center text-xl">Schaut euch das Bild an und entscheidet gemeinsam:</p>
                            
                            <div className="bg-amber-50 p-6 sm:p-8 rounded-[2rem] border-2 border-amber-200 flex flex-col items-center mb-8 shadow-inner">
                                <img 
                                    src={avatarGameItems[avatarGameIndex].img} 
                                    alt="Quiz Bild" 
                                    className="w-56 h-56 sm:w-64 sm:h-64 object-cover rounded-3xl shadow-lg border-4 border-white mb-6" 
                                />
                                <div className="bg-white px-4 py-1.5 rounded-full border border-amber-200 text-sm text-amber-600 uppercase tracking-widest font-bold shadow-sm">
                                    Bild {avatarGameIndex + 1} von {avatarGameItems.length}
                                </div>
                            </div>

                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6">
                                <button onClick={() => handleAvatarGame(true)} className="p-5 sm:p-6 bg-white border-2 border-amber-200 hover:border-amber-400 active:bg-amber-50 rounded-2xl text-xl sm:text-2xl font-bold text-amber-600 transition shadow-sm flex items-center justify-center gap-4 hover:-translate-y-1"><Smile size={32}/> Das ist ein Avatar!</button>
                                <button onClick={() => handleAvatarGame(false)} className="p-5 sm:p-6 bg-white border-2 border-slate-200 hover:border-slate-400 active:bg-slate-50 rounded-2xl text-xl sm:text-2xl font-bold text-slate-600 transition shadow-sm flex items-center justify-center gap-4 hover:-translate-y-1"><ImageIcon size={32}/> Das ist ein echtes Foto!</button>
                            </div>

                            {feedback && <div className={`mt-6 p-5 rounded-2xl font-bold text-center text-xl border-2 shadow-sm ${feedback.ok ? 'bg-emerald-50 text-emerald-700 border-emerald-300' : 'bg-rose-50 text-rose-700 border-rose-300'}`}>{feedback.msg}</div>}
                        </Box>
                    )}

                    {/* Step 2: Privacy Rules */}
                    {step === 2 && (
                        <Box title="Daten-Bewusstsein entwickeln" icon={Fingerprint} color="emerald">
                            <p>Ein Avatar ist toll, weil er das Prinzip der <Highlight color="text-emerald-700 bg-emerald-100">Datensparsamkeit</Highlight> erfüllt. Das bedeutet: Wir geben im Internet so wenig wie möglich von uns preis.</p>
                            <p>Aber der beste Avatar nützt nichts, wenn ihr euren echten Namen oder eure Adresse direkt im Profil daneben schreibt!</p>
                            <div className="mt-6 font-bold text-emerald-900 bg-emerald-100 p-6 rounded-3xl border-2 border-emerald-200 text-xl shadow-sm text-center">
                                Wir müssen unterscheiden lernen: Was darf ins Netz und was ist streng geheim?
                            </div>
                            <Button onClick={() => setStep(3)} className="mt-8" variant="success">Zur Daten-Sortiermaschine</Button>
                        </Box>
                    )}

                    {/* Step 3: Data Sorting Game */}
                    {step === 3 && (
                        <Box title="Die Daten-Sortiermaschine" icon={Monitor} color="sky">
                            <p className="text-center mb-6 font-bold text-slate-700 text-xl">Diese Informationen darfst du im Internet von dir preisgeben.</p>
                            
                            <div className="bg-sky-50 p-8 sm:p-10 rounded-[2rem] border-2 border-sky-200 text-center mb-8 shadow-inner relative overflow-hidden">
                                <p className="text-3xl sm:text-4xl font-bold font-title text-sky-800 leading-tight">{sortingCards[currentSortIdx].text}</p>
                                <div className="mt-8 inline-block bg-white px-4 py-1.5 rounded-full border border-sky-200 text-sm text-sky-500 uppercase tracking-widest font-bold shadow-sm">
                                    Karte {currentSortIdx + 1} von {sortingCards.length}
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-4 sm:gap-6">
                                <button onClick={() => handleSort(true)} className="p-5 sm:p-8 bg-white hover:bg-emerald-50 active:bg-emerald-100 border-4 border-emerald-300 rounded-3xl text-xl sm:text-2xl font-bold text-emerald-700 transition shadow-sm flex flex-col items-center gap-4 hover:-translate-y-1"><div className="bg-emerald-100 p-4 rounded-full"><ThumbsUp size={40} className="text-emerald-600"/></div> <span className="text-center">Das ist okay</span></button>
                                <button onClick={() => handleSort(false)} className="p-5 sm:p-8 bg-white hover:bg-rose-50 active:bg-rose-100 border-4 border-rose-300 rounded-3xl text-xl sm:text-2xl font-bold text-rose-700 transition shadow-sm flex flex-col items-center gap-4 hover:-translate-y-1"><div className="bg-rose-100 p-4 rounded-full"><ThumbsDown size={40} className="text-rose-600"/></div> <span className="text-center">Das ist geheim!</span></button>
                            </div>

                            {feedback && <div className={`mt-6 p-5 rounded-2xl font-bold text-center text-xl border-2 shadow-sm ${feedback.ok ? 'bg-emerald-50 text-emerald-700 border-emerald-300' : 'bg-rose-50 text-rose-700 border-rose-300'}`}>{feedback.msg}</div>}
                        </Box>
                    )}

                    {/* Step 4: Scenario Reflection */}
                    {step === 4 && (
                        <Box title="Was würdet ihr tun?" icon={MessageSquare} color="rose">
                            <div className="bg-slate-50 p-6 sm:p-8 rounded-3xl border-2 border-slate-200 mb-8 shadow-inner">
                                <p className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-2">Situation:</p>
                                <p className="text-xl font-medium text-slate-700 leading-snug">Ihr spielt ein cooles Online-Spiel. Jemand im Chat schreibt euch:</p>
                                <div className="bg-white p-5 sm:p-6 rounded-2xl border-2 border-slate-200 mt-4 shadow-sm">
                                    <p className="text-slate-800 font-bold italic text-xl">"Hey, dein Drachen-Avatar sieht mega cool aus! Schick mir doch mal ein echtes Bild von dir, damit ich weiß, wie du wirklich aussiehst!"</p>
                                </div>
                            </div>

                            <p className="font-bold text-rose-800 mb-4 text-center text-xl">Wie reagiert ihr?</p>

                            <div className="space-y-4">
                                <button onClick={()=>handleScenario(false)} className="w-full p-6 bg-white border-2 border-slate-200 hover:border-rose-300 active:bg-rose-50 rounded-2xl text-left transition font-medium text-slate-700 text-lg shadow-sm leading-snug hover:-translate-y-1">Ich schicke ein Bild, aber nur ein ganz normales, auf dem ich nett lächle.</button>
                                <button onClick={()=>handleScenario(true)} className="w-full p-6 bg-white border-2 border-slate-200 hover:border-emerald-300 active:bg-emerald-50 rounded-2xl text-left transition font-medium text-slate-700 text-lg shadow-sm leading-snug hover:-translate-y-1">Ich schicke auf keinen Fall ein echtes Bild! Ich ignoriere die Person oder blockiere sie.</button>
                            </div>
                            
                            {feedback && <div className={`mt-6 p-5 rounded-2xl font-bold text-center text-xl border-2 shadow-sm ${feedback.ok ? 'bg-emerald-50 text-emerald-700 border-emerald-300' : 'bg-rose-50 text-rose-700 border-rose-300'}`}>{feedback.msg}</div>}
                        </Box>
                    )}

                    {/* Step 5: Finished Theory -> Übergang zur Heftaufgabe */}
                    {step === 5 && (
                        <div className="text-center animate-fade-in mt-10">
                            <div className="bg-emerald-50 text-emerald-800 p-8 rounded-[2rem] border-2 border-emerald-300 mb-8 inline-block shadow-md">
                                <div className="bg-emerald-200 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <CheckCircle size={56} className="text-emerald-600" />
                                </div>
                                <h3 className="text-3xl font-bold font-title mb-2">Theorie geschafft!</h3>
                                <p className="text-[1.15rem] font-medium">Ihr habt ein tolles Datenbewusstsein entwickelt.</p>
                            </div>
                            <Button onClick={() => { setStep(6); window.scrollTo(0,0); }} icon={BookOpen} variant="primary" className="max-w-md mx-auto py-5">
                                Weiter zur Heftaufgabe
                            </Button>
                        </div>
                    )}

                    {/* Step 6: Heftaufgabe (Inline, kein Popup, passend skaliert) */}
                    {step === 6 && (
                        <div className="bg-[#fffcee] border-4 border-amber-300 p-6 sm:p-8 rounded-[2rem] shadow-md animate-fade-in mb-6 text-slate-800">
                            <h3 className="font-title text-2xl sm:text-3xl font-bold mb-4 text-amber-900 flex items-center gap-3 border-b-2 border-amber-200 pb-4">
                                <div className="bg-amber-200 p-3 rounded-2xl"><Edit3 className="text-amber-700" size={32}/></div>
                                Aufgabe: Think & Write!
                            </h3>
                            
                            <p className="font-bold text-amber-900 mb-4 text-[1.15rem]">
                                Schnappt euch euer Heft und notiert die wichtigsten Erkenntnisse in eigenen Worten:
                            </p>
                            
                            <div className="text-[1.15rem] leading-relaxed text-slate-700 pl-4 mb-8">
                                <ol className="list-decimal pl-4 space-y-3">
                                    <li>Was ist ein Avatar?</li>
                                    <li>Warum schützt ein Avatar unsere Privatsphäre im Internet besser als ein echtes Foto?</li>
                                    <li>Nenne 2 Beispiele für private Daten, die <strong>niemals</strong> ins Netz gehören.</li>
                                </ol>
                            </div>

                            <div className="flex flex-col items-center gap-3 bg-amber-50 p-6 rounded-2xl border-2 border-amber-200">
                                <p className="text-base font-bold text-amber-800 uppercase tracking-widest text-center">
                                    Habt ihr alles im Heft notiert?
                                </p>
                                <Button 
                                    onClick={handleHeftSubmit} 
                                    variant={(heftWait > 0 && !isTeacher) ? "secondary" : "amber"} 
                                    className="max-w-md"
                                >
                                    Fertig notiert! (Weiter)
                                </Button>
                                
                                {showHeftError && (
                                    <p className="text-rose-600 font-bold text-sm mt-1 animate-pulse text-center">
                                        Bitte bearbeitet die Aufgaben zuerst in Ruhe schriftlich!
                                    </p>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Step 7: Selbstkontrolle (Inline, kein Popup, passend skaliert) */}
                    {step === 7 && (
                        <div className="bg-[#f0fdf4] border-4 border-emerald-400 p-6 sm:p-8 rounded-[2rem] shadow-md animate-fade-in mb-6 text-slate-800">
                            <h3 className="font-title text-2xl sm:text-3xl font-bold mb-4 text-emerald-900 flex items-center gap-3 border-b-2 border-emerald-200 pb-4">
                                <div className="bg-emerald-200 p-3 rounded-2xl"><CheckCircle className="text-emerald-700" size={32}/></div>
                                Selbstkontrolle
                            </h3>
                            
                            <p className="text-[1.15rem] font-medium text-slate-700 mb-6 leading-relaxed">
                                Kontrolliert nun eure Ergebnisse. <strong>Verbessert oder ergänzt eure Notizen im Heft</strong>, falls euch noch etwas fehlt!
                            </p>

                            <div className="space-y-4 mb-8">
                                <div className="bg-white p-5 rounded-2xl border-2 border-emerald-100 shadow-sm">
                                    <p className="font-bold text-slate-800 text-[1.15rem] mb-2">1. Was ist ein Avatar?</p>
                                    <p className="text-emerald-700 font-medium text-[1.15rem] leading-relaxed"><strong>Lösung:</strong> Eine künstliche, digitale Figur, die uns im Internet vertritt.</p>
                                </div>
                                <div className="bg-white p-5 rounded-2xl border-2 border-emerald-100 shadow-sm">
                                    <p className="font-bold text-slate-800 text-[1.15rem] mb-2">2. Warum schützt ein Avatar unsere Privatsphäre besser?</p>
                                    <p className="text-emerald-700 font-medium text-[1.15rem] leading-relaxed"><strong>Lösung:</strong> Fremde erkennen nicht, wie wir in Wirklichkeit aussehen. So geben wir keine echten biometrischen Daten von unserem Gesicht preis.</p>
                                </div>
                                <div className="bg-white p-5 rounded-2xl border-2 border-emerald-100 shadow-sm">
                                    <p className="font-bold text-slate-800 text-[1.15rem] mb-2">3. Beispiele für streng private Daten?</p>
                                    <p className="text-emerald-700 font-medium text-[1.15rem] leading-relaxed"><strong>Lösung:</strong> Genaue Wohnadresse, echter voller Name, Passwörter, Echtzeit-Standort, echte Fotos von uns vor dem Haus.</p>
                                </div>
                            </div>
                            
                            <div className="flex flex-col items-center gap-3 bg-emerald-100 p-6 rounded-2xl border-2 border-emerald-300">
                                <p className="text-base font-bold text-emerald-900 uppercase tracking-widest text-center">
                                    Alles kontrolliert & verbessert?
                                </p>
                                <Button 
                                    onClick={handleCheckSubmit} 
                                    variant={(checkWait > 0 && !isTeacher) ? "secondary" : "success"} 
                                    className="max-w-md"
                                >
                                    Alles kontrolliert! (Weiter)
                                </Button>
                                
                                {showCheckError && (
                                    <p className="text-rose-600 font-bold text-sm mt-1 animate-pulse text-center">
                                        Bitte nehmt euch Zeit, eure Lösungen genau zu kontrollieren!
                                    </p>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- LEVEL 2: AVATAR ERSTELLEN ---
        const Level2 = ({ onComplete, isTeacher, skipSignal }) => {
            const [waitTimer, setWaitTimer] = useState(60);
            const [showLinkError, setShowLinkError] = useState(false);

            useEffect(() => {
                if (skipSignal > 0 || isTeacher) {
                    setWaitTimer(0);
                }
            }, [skipSignal, isTeacher]);

            useEffect(() => {
                if (waitTimer > 0) {
                    const t = setInterval(() => setWaitTimer(p => p - 1), 1000);
                    return () => clearInterval(t);
                }
            }, [waitTimer]);

            const handleLinkClick = () => {
                if (waitTimer > 0 && !isTeacher) {
                    setShowLinkError(true);
                    setTimeout(() => setShowLinkError(false), 3000);
                } else {
                    window.open('https://bloggerpilot.com/tools/avatar-generator/', '_blank');
                    onComplete();
                }
            };

            return (
                <div className="w-full max-w-5xl mx-auto p-4 sm:p-6 relative z-10 animate-fade-in">
                    
                    {/* TIPP BOXEN */}
                    <Box title="Wie sieht ein guter Avatar aus?" icon={Lightbulb} color="sky">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-2 mt-2">
                            <div className="bg-sky-50 p-6 rounded-[2rem] border-2 border-sky-200 shadow-sm flex flex-col items-start transition hover:-translate-y-1">
                                <div className="bg-sky-200 p-3 rounded-2xl text-sky-700 mb-4"><User size={28}/></div>
                                <h4 className="font-title font-bold text-xl text-sky-900 mb-2">1. Wiedererkennung</h4>
                                <p className="text-sky-800 font-medium leading-relaxed">Dein Avatar sollte dir entsprechen. Wähle eine passende Gesichtsform, Haut-, Augen- und Haarfarbe, damit deine Klasse dich erkennt!</p>
                            </div>
                            
                            <div className="bg-emerald-50 p-6 rounded-[2rem] border-2 border-emerald-200 shadow-sm flex flex-col items-start transition hover:-translate-y-1">
                                <div className="bg-emerald-200 p-3 rounded-2xl text-emerald-700 mb-4"><Shield size={28}/></div>
                                <h4 className="font-title font-bold text-xl text-emerald-900 mb-2">2. Datenschutz</h4>
                                <p className="text-emerald-800 font-medium leading-relaxed">Verwende niemals echte Fotos (auch nicht im Hintergrund) und schreibe keine echten Namen oder Wohnorte in das Bild.</p>
                            </div>
                            
                            <div className="bg-amber-50 p-6 rounded-[2rem] border-2 border-amber-200 shadow-sm flex flex-col items-start transition hover:-translate-y-1">
                                <div className="bg-amber-200 p-3 rounded-2xl text-amber-700 mb-4"><Smile size={28}/></div>
                                <h4 className="font-title font-bold text-xl text-amber-900 mb-2">3. Teamwork</h4>
                                <p className="text-amber-800 font-medium leading-relaxed">Oft sehen andere viel besser, wie du in Wirklichkeit aussiehst. Helft euch deshalb unbedingt gegenseitig bei der Erstellung!</p>
                            </div>
                        </div>
                    </Box>

                    {/* AUFGABEN & LINK */}
                    <Box title="Auf zur Avatar-Erstellung!" icon={PenTool} color="emerald">
                        <div className="space-y-8">

                            <div className="bg-emerald-100 p-5 sm:p-6 rounded-2xl border-2 border-emerald-300 flex items-start gap-4 shadow-sm">
                                <div className="bg-emerald-200 p-3 rounded-xl text-emerald-800 shrink-0"><HelpCircle size={28} /></div>
                                <p className="text-[1.15rem] leading-relaxed text-emerald-900">
                                    <strong>Wichtige Vorabinformationen:</strong> Lest euch die Hinweise 1 und 2 gut durch! Nach einer kurzen Lesezeit von 60 Sekunden wird der Link zur Erstellung freigeschaltet.
                                </p>
                            </div>

                            {/* Hinweis 1 */}
                            <div className="bg-white p-6 sm:p-8 rounded-[2rem] border-2 border-emerald-200 shadow-sm">
                                <h4 className="font-bold text-emerald-900 font-title text-2xl mb-4 flex items-center gap-3">
                                    <div className="bg-emerald-100 p-2 rounded-xl text-emerald-700"><PenTool size={24} /></div>
                                    Hinweis 1 – Den Avatar erstellen
                                </h4>
                                
                                <p className="text-emerald-800 font-medium text-[1.15rem] leading-relaxed mb-6">
                                    Klicke zunächst auf den männlichen oder den weiblichen Kopf, je nachdem ob du einen männlichen oder weiblichen Avatar erstellen möchtest.
                                </p>
                                
                                <p className="text-emerald-800 font-medium text-[1.15rem] leading-relaxed">
                                    Danach erscheint der Generator und du kannst loslegen. Versuche einen Avatar zu erstellen, der möglichst gut deinem aktuellen Aussehen entspricht und durch welchen man dich erkennen kann! Lass dir von deinen Mitschüler*innen helfen, um die richtige Kopf-, Lippen-, Nasen-, Augen- und Ohrenform zu finden – immerhin kannst du dich ja selbst gerade nicht im Spiegel betrachten!
                                </p>
                            </div>

                            {/* Hinweis 2 */}
                            <div className="bg-white p-6 sm:p-8 rounded-[2rem] border-2 border-amber-200 shadow-sm">
                                <h4 className="font-bold text-amber-900 font-title text-2xl mb-4 flex items-center gap-3">
                                    <div className="bg-amber-100 p-2 rounded-xl text-amber-700"><Download size={24} /></div>
                                    Hinweis 2 – Den Avatar herunterladen
                                </h4>
                                <p className="text-amber-800 font-medium text-[1.15rem] leading-relaxed mb-6">
                                    Wenn du mit deinem Avatar fertig bist, kannst du ihn unten rechts herunterladen. Klicke dafür zunächst auf „herunterladen“ und dann jeweils auf „png 200x200“, dann auf „png 400x400“ und dann auf „svg-Vektor Format“. Dadurch hast du deinen Avatar in klein, groß und flexibel gesichert.
                                </p>

                                {/* Wichtiger Hinweis für Tablet-Nutzer */}
                                <div className="bg-amber-50 p-5 rounded-2xl border-2 border-amber-300 flex items-start gap-4">
                                    <div className="bg-amber-200 p-2 rounded-xl text-amber-800 shrink-0 mt-0.5">
                                        <AlertTriangle size={24} />
                                    </div>
                                    <div>
                                        <p className="font-bold text-amber-900 text-[1.1rem] mb-1">Wichtiger Hinweis für Tablets / iPads:</p>
                                        <p className="text-amber-800 font-medium text-[1.1rem] leading-relaxed">
                                            Wenn du nicht am PC, sondern am Tablet arbeitest, funktioniert das Speichern etwas anders als oben beschrieben und im Video gezeigt: Tippe auf Herunterladen, tippe dann lange auf das erscheinende Bild und wähle „Bild speichern“ und dann „In Fotos speichern“ aus! Nun ist dein Avatar unter Fotos auf dem Tablet gespeichert.
                                        </p>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-sky-50 border-2 border-sky-200 p-8 rounded-[2.5rem] text-center shadow-md mt-10">
                                <p className="text-xl sm:text-2xl font-bold text-sky-900 mb-6">
                                    Öffnet den folgenden Link, um nacheinander mit gegenseitiger Hilfe eure Avatar-Bilder zu erstellen:
                                </p>

                                <button 
                                    disabled={waitTimer > 0 && !isTeacher}
                                    onClick={handleLinkClick}
                                    className={`w-full py-6 px-8 text-white text-center rounded-[2rem] font-bold text-2xl border-b-[6px] shadow-lg transition-transform flex flex-col sm:flex-row items-center justify-center gap-4 ${(waitTimer > 0 && !isTeacher) ? 'bg-slate-400 border-slate-500 cursor-not-allowed' : 'bg-sky-500 hover:bg-sky-600 border-sky-700 active:scale-[0.98] hover:-translate-y-1'}`}
                                >
                                    <ExternalLink size={36} /> {waitTimer > 0 && !isTeacher ? `Bitte Hinweise lesen (${waitTimer}s)` : 'Avatar-Generator öffnen'}
                                </button>

                                {showLinkError && (
                                    <p className="text-rose-600 font-bold text-lg mt-4 animate-pulse text-center">
                                        Bitte lies dir zuerst die Hinweise in Ruhe durch!
                                    </p>
                                )}
                            </div>

                        </div>
                    </Box>
                </div>
            );
        };

        // --- SUCCESS SCREEN ---
        const FinishScreen = () => (
            <div className="min-h-screen flex items-center justify-center p-4 sm:p-6 relative z-10 animate-fade-in">
                <div className="bg-emerald-50 text-emerald-800 p-8 sm:p-12 rounded-[2.5rem] border-4 border-emerald-200 shadow-2xl max-w-3xl mx-auto relative overflow-hidden text-center">
                    <div className="absolute -top-10 -right-10 text-emerald-200 opacity-50"><Award size={200}/></div>
                    <div className="relative z-10">
                        <div className="bg-emerald-200 w-24 h-24 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-md">
                            <Award size={64} className="text-emerald-600" />
                        </div>
                        <h3 className="text-4xl sm:text-5xl font-bold font-title mb-6">Geschafft!</h3>
                        <p className="text-xl sm:text-2xl font-medium leading-relaxed mb-4">
                            Ihr habt den Lernpfad zur Vorbereitung erfolgreich beendet!
                        </p>
                        <p className="text-lg sm:text-xl font-medium text-emerald-700">
                            Ihr könnt nun in Ruhe im neu geöffneten Tab eure Avatare erstellen und herunterladen. Viel Spaß dabei!
                        </p>
                    </div>
                </div>
            </div>
        );


        // --- HAUPT APP ---
        const App = () => {
            const [view, setView] = useState('welcome');
            const [unlocked, setUnlocked] = useState(1);
            const [activeLevel, setActiveLevel] = useState(1);
            
            // Lehrer-Status global
            const [isTeacher, setIsTeacher] = useState(false);
            const [teacherModalOpen, setTeacherModalOpen] = useState(false);
            const [skipSignal, setSkipSignal] = useState(0);

            const handleStart = () => {
                window.scrollTo(0,0);
                setView('menu');
            };

            const completeLevel = () => {
                window.scrollTo(0,0);
                if(activeLevel === 1) {
                    setUnlocked(2);
                    setView('menu');
                } else if (activeLevel === 2) {
                    setView('finish'); 
                }
            };

            return (
                <div className="min-h-screen relative font-sans text-slate-800 flex flex-col">
                    <Background />

                    <TeacherModal 
                        isOpen={teacherModalOpen} 
                        onClose={() => setTeacherModalOpen(false)} 
                        onGlobalUnlock={() => { setIsTeacher(true); setUnlocked(2); }} 
                        onSkipCurrent={() => setSkipSignal(s => s + 1)}
                    />
                    
                    {/* Permanenter Header mit Level-Anzeige und Lehrer-Button */}
                    {view !== 'welcome' && (
                        <div className="sticky top-0 z-50 bg-white/90 backdrop-blur-xl border-b-2 border-slate-100 px-4 sm:px-8 py-3 shadow-sm flex items-center justify-between">
                            
                            {view === 'level' ? (
                                <button onClick={() => { setView('menu'); window.scrollTo(0,0); }} className="flex items-center gap-2 text-indigo-600 font-bold bg-indigo-50 border-2 border-indigo-100 px-4 py-2.5 rounded-2xl hover:bg-indigo-100 transition active:scale-95 shadow-sm">
                                    <ChevronLeft size={24} />
                                    <span className="text-base sm:text-lg">Übersicht</span>
                                </button>
                            ) : (
                                <div className="text-indigo-800 font-bold font-title text-xl tracking-wide">
                                    Projekt: Avatar
                                </div>
                            )}
                            
                            <div className="flex items-center gap-3 sm:gap-4">
                                {view === 'level' && (
                                    <span className="bg-indigo-100 text-indigo-800 px-4 sm:px-5 py-2 rounded-2xl font-bold font-title uppercase tracking-widest text-sm sm:text-base border-2 border-indigo-200 shadow-sm">
                                        Level {activeLevel}
                                    </span>
                                )}
                                
                                <button 
                                    onClick={() => !isTeacher && setTeacherModalOpen(true)} 
                                    className={`p-2 rounded-xl border-2 transition shadow-sm flex items-center justify-center hover:scale-105 active:scale-95 ${isTeacher ? 'bg-emerald-100 border-emerald-300 text-emerald-700 cursor-default' : 'bg-white border-slate-200 text-slate-400 hover:text-indigo-500'}`}
                                    title={isTeacher ? "Lehrermodus aktiv (Alle Sperren aufgehoben)" : "Lehrer-Login öffnen"}
                                >
                                    {isTeacher ? <Unlock size={22} /> : <Lock size={22} />}
                                </button>
                            </div>

                        </div>
                    )}
                    
                    {view === 'welcome' && <WelcomeScreen onStart={handleStart} />}
                    {view === 'menu' && <MenuScreen unlocked={unlocked} onSelect={id => { setActiveLevel(id); setView('level'); window.scrollTo(0,0); }} />}
                    
                    {view === 'level' && (
                        <div className="flex-1 py-4 sm:py-8">
                            {activeLevel === 1 && <Level1 onComplete={completeLevel} isTeacher={isTeacher} skipSignal={skipSignal} />}
                            {activeLevel === 2 && <Level2 onComplete={completeLevel} isTeacher={isTeacher} skipSignal={skipSignal} />}
                        </div>
                    )}

                    {view === 'finish' && <FinishScreen />}
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
