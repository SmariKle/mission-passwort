                </h3>
                <input 
                  type="password"
                  value={code}
                  onChange={(e) => setCode(e.target.value)}
                  className="w-full p-4 bg-slate-950 border border-slate-700 rounded-xl text-lg font-bold font-mono text-amber-400 outline-none mb-8 focus:border-amber-500 transition-colors"
                  placeholder="••••••"
                  autoFocus
                />
                <div className="flex gap-4">
                  <button 
                    onClick={() => { onApplyCode(code); setCode(''); onClose(); }}
                    className="flex-1 py-4 bg-amber-500 border border-amber-400 rounded-xl font-bold text-slate-950 active:scale-95 text-lg transition-all uppercase"
                  >
                    OK
                  </button>
                  <button 
                    onClick={onClose}
                    className="flex-1 py-4 bg-slate-800 border border-slate-600 rounded-xl font-bold text-white active:scale-95 text-lg transition-all uppercase"
                  >
                    X
                  </button>
                </div>
              </div>
            </div>
          );
        };

        const WorksheetModal = ({ isOpen, onClose, children, t }) => {
          const [timeLeft, setTimeLeft] = useState(15);
          const [warning, setWarning] = useState(false);

          useEffect(() => {
            if (!isOpen) { setTimeLeft(15); setWarning(false); return; }
            const timer = setInterval(() => {
              setTimeLeft(prev => (prev > 0 ? prev - 1 : 0));
            }, 1000);
            return () => clearInterval(timer);
          }, [isOpen]);

          if (!isOpen) return null;

          const handleClose = () => {
            if (timeLeft > 0) {
              setWarning(true);
              setTimeout(() => setWarning(false), 4000);
            } else {
              onClose();
            }
          };

          return (
            <div className="fixed inset-0 z-[600] flex flex-col items-center justify-end p-4 md:p-8 bg-slate-950/25 pointer-events-auto">
              <div className="w-full max-w-2xl bg-slate-900/95 border-2 border-rose-500 p-6 md:p-8 rounded-2xl shadow-[0_0_40px_rgba(244,63,94,0.3)] relative mb-4">
                <button onClick={handleClose} className="absolute top-4 right-4 bg-slate-800 text-rose-500 border border-rose-500/50 w-12 h-12 rounded-xl font-bold text-2xl active:scale-90 flex items-center justify-center transition-transform touch-manipulation">
                  X
                </button>
                <div className="flex items-center gap-4 mb-6 pb-4 border-b border-slate-800 pr-12">
                  <div className="text-rose-500">
                    <FileText size={32} />
                  </div>
                  <h3 className="text-rose-500 font-bold font-mono text-2xl uppercase tracking-widest leading-snug break-words">{t('attentionAB')}</h3>
                </div>
                <div className="text-slate-100 font-normal text-lg leading-relaxed mb-6">
                  {children}
                </div>
                {warning && (
                  <div className="bg-amber-950/80 border border-amber-500 text-amber-400 p-4 rounded-xl font-bold text-lg uppercase text-center shadow-md">
                    {t('abWait')}
                  </div>
                )}
              </div>
            </div>
          );
        };

        const ScreenWrapper = ({ children, title, onBack, agentNames, t, onLangToggle, lang, view, onTeacherCode, modal }) => {
          const [isTeacherModalOpen, setIsTeacherModalOpen] = useState(false);
          const displayTitle = view === 'welcome' ? t('missionsLogin') : title;

          useEffect(() => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
          }, [view, title]);

          return (
            <div className="min-h-screen text-slate-100 p-6 flex flex-col items-center pb-24 relative overflow-x-hidden">
              <Background />
              <TeacherModal 
                isOpen={isTeacherModalOpen} 
                onClose={() => setIsTeacherModalOpen(false)} 
                t={t} 
                onApplyCode={onTeacherCode}
              />
              {modal}
              
              <div className="w-full max-w-5xl relative z-10 flex flex-col gap-8">
                {/* Header Bar */}
                <div className="flex flex-col md:flex-row gap-6 items-center justify-between border-b border-cyan-500/30 pb-6">
                  <div className="flex items-center gap-4">
                    {onBack && (
                      <button onClick={onBack} className="bg-slate-900 border border-cyan-500/50 p-4 rounded-xl active:scale-95 transition-all touch-manipulation shadow-md">
                        <ArrowLeft size={28} className="text-cyan-400" />
                      </button>
                    )}
                    <div 
                      className="bg-slate-900 border border-emerald-500/50 p-4 rounded-xl cursor-pointer active:scale-95 transition-all shadow-md touch-manipulation hover:bg-emerald-950/50"
                      onClick={() => setIsTeacherModalOpen(true)}
                    >
                      <Shield size={28} className="text-emerald-400" />
                    </div>
                    <div className="flex flex-col">
                      <h1 className="text-2xl font-bold font-mono text-white uppercase tracking-widest break-words">{displayTitle}</h1>
                    </div>
                  </div>

                  <div className="flex items-center gap-4">
                    {agentNames && agentNames.length > 0 && (
                      <div className="flex gap-4">
                        {agentNames.map((name, i) => name && (
                          <div key={i} className={`px-4 py-3 rounded-xl border shadow-md text-lg font-bold flex items-center gap-2 uppercase bg-slate-900 ${i === 0 ? 'border-emerald-500/70 text-emerald-400' : 'border-cyan-500/70 text-cyan-400'}`}>
                            <User size={20}/> {name}
                          </div>
                        ))}
                      </div>
                    )}
                    
                    <button 
                      onClick={onLangToggle}
                      className="bg-slate-900 border border-indigo-500/50 px-6 py-3 rounded-xl text-indigo-400 font-bold text-lg flex items-center gap-3 transition-all active:scale-95 uppercase touch-manipulation shadow-md hover:bg-indigo-950/50"
                    >
                      <Globe size={24} /> {lang === 'de' ? 'RU' : 'DE'}
                    </button>
                  </div>
                </div>

                <GameBox className="p-8 min-h-[60vh] flex flex-col">
                  {children}
                </GameBox>
              </div>
            </div>
          );
        };

        const Button = ({ onClick, children, variant = 'primary', disabled = false, className = "", icon: Icon }) => {
          const variants = {
            primary: "bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white border border-cyan-400",
            secondary: "bg-gradient-to-r from-slate-800 to-slate-700 hover:from-slate-700 hover:to-slate-600 text-cyan-400 border border-cyan-500/50",
            success: "bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white border border-emerald-400",
            danger: "bg-gradient-to-r from-rose-600 to-pink-600 hover:from-rose-500 hover:to-pink-500 text-white border border-rose-400",
          };
          
          return (
            <button 
              onClick={onClick} 
              disabled={disabled} 
              className={`w-full py-4 px-6 rounded-xl font-bold text-lg transition-all flex items-center justify-center gap-3 uppercase tracking-widest active:scale-95 disabled:opacity-50 touch-manipulation break-words shadow-lg ${variants[variant]} ${className}`}
            >
              {Icon && <Icon size={24} />}
              {children}
            </button>
          );
        };

        const InfoCard = ({ children, title, t }) => (
          <div className="bg-slate-900/95 p-8 rounded-2xl border border-cyan-500/50 mb-8 text-slate-100 font-normal relative shadow-[0_0_20px_rgba(6,182,212,0.1)]">
            <div className="absolute top-0 right-6 bg-cyan-950 text-cyan-400 font-bold font-mono px-4 py-1 rounded-b-lg border-x border-b border-cyan-500/50 text-lg uppercase tracking-widest shadow-md flex items-center gap-2">
              {t('infoTitle')} <Info size={20} />
            </div>
            <h3 className="text-cyan-400 font-bold font-mono mb-6 uppercase tracking-widest text-2xl border-b border-cyan-500/30 pb-4 mt-2">
              {title}
            </h3>
            <div className="relative z-10 text-lg leading-relaxed">{children}</div>
          </div>
        );

        // --- Screen Komponenten ---

        const SetupScreen = ({ onStart, t, onLangToggle, lang, onTeacherCode }) => {
          const [step, setStep] = useState(1);
          const [mode, setMode] = useState(1);
          const [names, setNames] = useState(["", ""]);

          if (step === 1) {
            return (
              <ScreenWrapper view="welcome" t={t} lang={lang} onLangToggle={onLangToggle} onTeacherCode={onTeacherCode}>
                <div className="flex flex-col items-center text-center space-y-10 py-6">
                  <div className="bg-gradient-to-br from-cyan-900 to-slate-900 p-10 rounded-full border border-cyan-500/50 shadow-[0_0_30px_rgba(6,182,212,0.3)] animate-pulse">
                    <Key size={56} className="text-cyan-400" />
                  </div>

                  <div className="space-y-4">
                    <h1 className="text-2xl font-bold font-mono text-white uppercase tracking-widest leading-snug break-words">
                      {t('mission')}<br/>
                      <span className="text-cyan-400 drop-shadow-md">{t('securePassword')}</span>
                    </h1>
                  </div>

                  <GameBox color="bg-gradient-to-br from-slate-900 to-slate-950" className="p-8 max-w-4xl border-emerald-500/50 w-full">
                    <div className="flex items-center gap-4 mb-6 border-b border-emerald-500/30 pb-4">
                      <div className="text-emerald-400"><UserCheck size={28} /></div>
                      <h2 className="text-2xl font-bold font-mono text-emerald-400 uppercase tracking-widest">{t('euerAuftrag')}</h2>
                    </div>
                    <div className="text-lg font-normal leading-relaxed text-slate-200 text-left space-y-4">
                      <p>{t('welcome_p1')}</p>
                      <p>{t('welcome_p2')}</p>
                      <p>{t('welcome_p3')}</p>
                    </div>
                  </GameBox>

                  <div className="w-full max-w-4xl space-y-6 pt-6 border-t border-slate-700/80">
                    <h3 className="text-slate-400 font-bold font-mono uppercase tracking-widest text-2xl">{t('playerCount')}</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      <Button onClick={() => { setMode(1); setStep(2); }} variant="secondary" icon={User}>
                        {t('onePlayer')}
                      </Button>
                      <Button onClick={() => { setMode(2); setStep(2); }} variant="success" icon={Users}>
                        {t('twoPlayers')}
                      </Button>
                    </div>
                  </div>
                </div>
              </ScreenWrapper>
            );
          }

          return (
            <ScreenWrapper title={mode === 1 ? t('decknameSingle') : t('decknamen')} onBack={() => setStep(1)} t={t} lang={lang} onLangToggle={onLangToggle} onTeacherCode={onTeacherCode}>
              <div className="max-w-3xl mx-auto w-full space-y-10 py-6">
                <div className="text-center space-y-6 border-b border-cyan-500/50 pb-8">
                  <Fingerprint size={56} className="text-cyan-400 mx-auto mb-6" />
                  <h2 className="text-2xl font-bold font-mono text-cyan-400 uppercase tracking-widest break-words">{mode === 1 ? t('decknameSingle') : t('decknamen')}</h2>
                  <p className="text-slate-200 font-normal text-lg">{mode === 1 ? t('decknameSingleHint') : t('nameHint')}</p>
                </div>

                <div className="space-y-6">
                  {[...Array(mode)].map((_, i) => (
                    <div key={i} className={`bg-gradient-to-br from-slate-900 to-slate-950 p-8 rounded-2xl border shadow-xl ${i === 0 ? 'border-emerald-500/70 shadow-[0_0_20px_rgba(16,185,129,0.1)]' : 'border-cyan-500/70 shadow-[0_0_20px_rgba(6,182,212,0.1)]'}`}>
                      <label className={`font-bold font-mono uppercase text-lg tracking-[0.2em] mb-4 block ${i === 0 ? 'text-emerald-400' : 'text-cyan-400'}`}>
                        {t('agent')} {i + 1}
                      </label>
                      <div className="flex gap-4">
                        <input 
                          type="text" 
                          value={names[i]} 
                          onChange={(e) => { let n = [...names]; n[i] = e.target.value; setNames(n); }}
                          placeholder={t('enterName')}
                          className="flex-1 bg-slate-950 border border-slate-700 rounded-xl px-6 py-4 text-lg font-bold font-mono text-white outline-none focus:border-amber-500 transition-all placeholder:text-slate-600 min-w-0"
                        />
                        <button 
                          onClick={() => { 
                            const list = lang === 'de' ? FUNNY_NAMES_LIST_DE : FUNNY_NAMES_LIST_RU;
                            let n = [...names]; 
                            n[i] = list[Math.floor(Math.random() * list.length)]; 
                            setNames(n); 
                          }} 
                          className="bg-gradient-to-br from-amber-600 to-amber-500 p-4 rounded-xl border border-amber-400 active:scale-95 text-slate-950 touch-manipulation flex-shrink-0 transition-transform shadow-md"
                        >
                          <Dices size={28} />
                        </button>
                      </div>
                    </div>
                  ))}
                </div>

                <Button onClick={() => onStart(mode, names)} variant="primary" icon={Rocket} className="mt-8">
                  {t('startMission')}
                </Button>
              </div>
            </ScreenWrapper>
          );
        };

        const OverviewScreen = ({ maxUnlocked, onSelectLevel, agentNames, t, lang, onLangToggle, onTeacherCode }) => {
          const levels = [
            { id: 1, key: "l1_title", color: "border-cyan-500/70" },
            { id: 2, key: "l2_title", color: "border-amber-500/70" },
            { id: 3, key: "l3_title", color: "border-rose-500/70" },
            { id: 4, key: "l4_title", color: "border-emerald-500/70" },
            { id: 5, key: "l5_title", color: "border-indigo-500/70" },
            { id: 6, key: "l6_title", color: "border-fuchsia-500/70" },
            { id: 7, key: "l7_title", color: "border-cyan-500/70" },
            { id: 8, key: "l8_title", color: "border-emerald-500/70" },
            { id: 9, key: "l9_title", color: "border-rose-500/70" },
            { id: 10, key: "l10_title", color: "border-amber-500/70" } 
          ];

          return (
            <ScreenWrapper title={t('hauptmenü')} agentNames={agentNames} t={t} lang={lang} onLangToggle={onLangToggle} onTeacherCode={onTeacherCode} view="overview">
              <div className="bg-gradient-to-r from-cyan-900/40 to-blue-900/40 p-6 rounded-2xl border border-cyan-500/50 mb-8 text-center shadow-lg">
                <p className="font-bold font-mono text-cyan-400 text-lg tracking-widest uppercase break-words">{t('akteWählen')}</p>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                {levels.map(l => {
                  const isUnlocked = l.id <= maxUnlocked;
                  const isNext = l.id === maxUnlocked;
                  const fullTitle = t(l.key);
                  const titleParts = fullTitle.split(': ');
                  const mainTitle = titleParts.length > 1 ? titleParts[1] : fullTitle;

                  return (
                    <button 
                      key={l.id}
                      onClick={() => isUnlocked && onSelectLevel(l.id)}
                      className={`p-6 rounded-2xl border flex items-center justify-between transition-all touch-manipulation relative ${isUnlocked ? `bg-gradient-to-br from-slate-900 to-slate-800 shadow-[0_0_15px_rgba(255,255,255,0.05)] hover:from-slate-800 hover:to-slate-700 active:scale-95 ${isNext ? 'next-level-glow bg-gradient-to-br from-slate-800 to-slate-900' : l.color}` : 'bg-slate-950 border-slate-800 opacity-60 grayscale'}`}
                    >
                      <div className="flex items-center gap-6 text-left flex-1 min-w-0 pr-4">
                        <div className={`w-16 h-16 flex-shrink-0 rounded-xl flex items-center justify-center font-bold font-mono text-2xl border ${isUnlocked ? `border-current shadow-inner ${isNext ? 'bg-cyan-950 text-white' : 'bg-slate-950/80 text-slate-300'}` : 'border-slate-700 bg-slate-900 text-slate-500'}`}>
                          {l.id}
                        </div>
                        <div className="flex flex-col flex-1 min-w-0">
                          <span className={`text-lg font-bold font-mono tracking-widest mb-1 uppercase ${isNext ? 'text-cyan-400' : 'text-slate-400 opacity-80'}`}>{t('akte')}</span>
                          <span className={`text-2xl font-bold font-mono uppercase tracking-widest leading-tight break-words hyphens-auto ${isNext ? 'text-white' : 'text-slate-200'}`}>{mainTitle}</span>
                        </div>
                      </div>
                      {!isUnlocked && <Lock size={32} className="text-slate-600 flex-shrink-0" />}
                      {isUnlocked && <PlayCircle size={36} className={`flex-shrink-0 transition-all ${isNext ? 'text-cyan-400 opacity-100' : 'text-slate-400 opacity-90'}`} />}
                    </button>
                  );
                })}
              </div>
            </ScreenWrapper>
          );
        };

        // --- Level 1 ---
        const Level1 = ({ state, updateState, onBack, onComplete, agentNames, t, lang, onLangToggle, onTeacherCode }) => {
          const { answered = false, feedback = "" } = state;
          const handleAnswer = (c) => {
            if (c) {
              updateState({ answered: true, feedback: "" });
            } else {
              updateState({ feedback: t('l1_fbWrong') });
            }
          };
          
          return (
            <ScreenWrapper title={t('l1_title')} onBack={onBack} agentNames={agentNames} t={t} lang={lang} onLangToggle={onLangToggle} onTeacherCode={onTeacherCode}>
              <div className="space-y-8 max-w-4xl mx-auto w-full">
                <InfoCard title={t('l1_infoHead')} t={t}>
                  <div className="space-y-4">
                    <p>{t('l1_p1')}</p>
                    <p>{t('l1_p2')}</p>
                    <p>{t('l1_p3')}</p>
                    <p>{t('l1_p4')}</p>
                  </div>
                </InfoCard>

                <div className="bg-gradient-to-br from-slate-900 to-slate-950 p-8 rounded-2xl border border-slate-700 shadow-xl relative overflow-hidden">
                  <SectionTitle icon={HelpCircle} color="text-amber-400" title={t('quizTitle')} />
                  <div className="text-white font-bold text-xl mb-6 leading-relaxed">
                    {t('l1_q1')}
                  </div>
                  <div className="space-y-4">
                    <button onClick={() => handleAnswer(false)} className="w-full p-6 bg-slate-950 border border-slate-700 rounded-xl text-white font-normal text-lg text-left active:scale-95 transition-all touch-manipulation hover:bg-slate-800">
                      {t('l1_a1')}
                    </button>
                    <button 
                      onClick={() => handleAnswer(true)} 
                      className={`w-full p-6 border rounded-xl font-normal text-lg text-left active:scale-95 transition-all touch-manipulation ${answered ? 'bg-gradient-to-r from-emerald-900 to-emerald-800 text-emerald-400 border-emerald-500 shadow-lg' : 'bg-slate-950 border-slate-700 text-white hover:bg-slate-800'}`}
                    >
                      {t('l1_a2')}
                    </button>
                    <button onClick={() => handleAnswer(false)} className="w-full p-6 bg-slate-950 border border-slate-700 rounded-xl text-white font-normal text-lg text-left active:scale-95 transition-all touch-manipulation hover:bg-slate-800">
                      {t('l1_a3')}
                    </button>
                  </div>
                  {feedback && !answered && (
                    <div className="mt-6 p-6 bg-gradient-to-r from-rose-900 to-rose-800 border border-rose-500 rounded-xl text-rose-300 font-bold font-mono text-2xl uppercase text-center shadow-lg break-words">
                      {feedback}
                    </div>
                  )}
                </div>

                {answered && (
                  <div className="space-y-8 pt-4">
                    <div className="p-8 bg-gradient-to-r from-emerald-900 to-emerald-800 border border-emerald-500 rounded-2xl text-emerald-400 font-bold font-mono text-2xl uppercase tracking-widest flex items-center gap-6 shadow-xl break-words">
                      <div className="text-emerald-400"><CheckCircle size={36} className="flex-shrink-0" /></div>
                      {t('l1_success')}
                    </div>
                    <Button onClick={onComplete} variant="success" icon={Lock}>{t('finish')}</Button>
                  </div>
                )}
              </div>
            </ScreenWrapper>
          );
        };

        // --- Level 2 ---
        const Level2 = ({ state, updateState, onBack, onComplete, agentNames, t, lang, onLangToggle, onTeacherCode }) => {
          const { step = 0, lives = 3, gameWon = false, showABModal = false, worksheetDone = false, feedback = "", isError = false } = state;
          const profiles = t('l2_profiles');

          const handleHack = (choice) => {
            if (choice === profiles[step].c) {
              updateState({ feedback: t('l2_fbRight'), isError: false });
              setTimeout(() => {
                if (step + 1 === profiles.length) {
                  updateState({ gameWon: true, feedback: "" });
                  setTimeout(() => updateState({ showABModal: true }), 3000);
                } else {
                  updateState({ step: step + 1, feedback: "" });
                }
              }, 1500);
            } else {
              if (lives - 1 <= 0) {
                updateState({ feedback: t('l2_fbAlarm'), isError: true });
                setTimeout(() => updateState({ lives: 3, step: 0, feedback: "" }), 2500);
              } else {
                updateState({ lives: lives - 1, feedback: t('l2_fbLife'), isError: true });
                setTimeout(() => updateState({ feedback: "" }), 1500);
              }
            }
          };

          return (
            <ScreenWrapper 
              title={t('l2_title')} 
              onBack={onBack} 
              agentNames={agentNames} 
              t={t} 
              lang={lang} 
              onLangToggle={onLangToggle} 
              onTeacherCode={onTeacherCode}
              modal={
                <WorksheetModal isOpen={showABModal} onClose={() => updateState({ showABModal: false, worksheetDone: true })} t={t}>
                  {t('l2_ab')}
                </WorksheetModal>
              }
            >
              <div className="space-y-8 max-w-4xl mx-auto w-full">
                <InfoCard title={t('l2_infoHead')} t={t}>
                  <div className="space-y-4">
                    <p>{t('l2_p1')}</p>
                    <p>{t('l2_p2')}</p>
                    <p>{t('l2_p3')}</p>
                  </div>
                </InfoCard>

                {!gameWon ? (
                  <div className="bg-gradient-to-br from-slate-900 to-slate-950 p-8 rounded-2xl border border-slate-700 shadow-xl relative">
                    <SectionTitle icon={Target} color="text-amber-400" title={t('l2_task')} >
                       <span className="text-amber-400 ml-2">{step + 1} {t('l2_of')} 4</span>
                    </SectionTitle>
                    
                    <div className="flex justify-between items-center mb-6">
                       <div className="flex gap-2 bg-slate-950 p-3 rounded-xl border border-slate-800 flex-shrink-0 shadow-inner">
                         {[...Array(3)].map((_, i) => <Heart key={i} size={24} className={`${i < lives ? 'text-rose-500 fill-current drop-shadow-md' : 'text-slate-800'}`} />)}
                       </div>
                    </div>
                    <p className="text-white font-bold text-xl mb-6 text-center leading-relaxed">{t('l2_hackPrompt')}</p>
                    
                    <div className="bg-gradient-to-r from-slate-900 to-cyan-950 p-8 rounded-xl border border-cyan-500/50 text-white mb-8 relative shadow-md">
                      <p className="text-cyan-400 text-lg font-bold font-mono tracking-widest uppercase mb-2 absolute top-[-14px] left-6 bg-slate-900 px-3 border border-cyan-500/30 rounded shadow-sm">{t('l2_profile')}</p>
                      <p className="text-2xl font-bold font-mono mb-4 text-cyan-50 uppercase break-words pt-2">{profiles[step].name}</p>
                      <p className="text-lg font-normal text-slate-200 leading-relaxed border-l-4 border-cyan-500/50 pl-4 break-words">"{profiles[step].info}"</p>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      {profiles[step].opts.map(o => (
                        <button key={o} onClick={() => handleHack(o)} className="p-6 bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-xl font-bold font-mono text-lg text-white active:scale-95 transition-all touch-manipulation break-all shadow-md">
                          {o}
                        </button>
                      ))}
                    </div>
                    {feedback && (
                      <div className={`mt-8 p-6 rounded-xl border text-center font-bold font-mono text-2xl uppercase tracking-widest break-words ${isError ? 'bg-gradient-to-r from-rose-900 to-rose-800 border-rose-500 text-rose-300 shadow-lg' : 'bg-gradient-to-r from-emerald-900 to-emerald-800 border-emerald-500 text-emerald-300 shadow-lg'}`}>
                        {feedback}
                      </div>
                    )}
                  </div>
                ) : (
                  <div className="space-y-8">
                    <div className="p-10 bg-gradient-to-r from-emerald-900 to-emerald-800 border border-emerald-500 rounded-2xl text-emerald-400 font-bold font-mono text-2xl uppercase tracking-widest text-center shadow-xl leading-relaxed break-words">
                       {t('l2_success')}
                    </div>
                    {worksheetDone && <Button onClick={onComplete} variant="success" icon={Lock}>{t('finish')}</Button>}
                  </div>
                )}
              </div>
            </ScreenWrapper>
          );
        };

        // --- Level 3 ---
        const Level3 = ({ state, updateState, onBack, onComplete, agentNames, t, lang, onLangToggle, onTeacherCode }) => {
          const times = t('l3_times');
          
          const order = state.order || [2, 3, 4, 1];
          
          const baseItems = {
            2: { text: lang === 'de' ? "passwort" : "пароль", time: times.t2 },
            3: { text: lang === 'de' ? "KatzeHund" : "КошкаСобака", time: times.t4 },
            4: { text: lang === 'de' ? "Sommer2024" : "Лето2024", time: times.t1 },
            1: { text: "M!ss1on_P@ss", time: times.t3 }
          };
          
          const passwords = order.map(id => ({ id, ...baseItems[id] }));

          const { checked = false, analysisDone = false, selections = [], feedback = "", isError = false } = state;
          const correctOrder = [2, 3, 4, 1];

          const move = (idx, dir) => {
            let n = [...order];
            let target = idx + dir;
            if (target < 0 || target >= n.length) return;
            [n[idx], n[target]] = [n[target], n[idx]];
            updateState({ order: n, checked: false, feedback: "" });
          };

          const isSorted = passwords.every((p, i) => p.id === correctOrder[i]);
          const analysisOptions = t('l3_opts');

          return (
            <ScreenWrapper title={t('l3_title')} onBack={onBack} agentNames={agentNames} t={t} lang={lang} onLangToggle={onLangToggle} onTeacherCode={onTeacherCode}>
              <div className="space-y-8 max-w-4xl mx-auto w-full">
                <InfoCard title={t('l3_infoHead')} t={t}>
                  <div className="space-y-4">
                    <p>{t('l3_p1')}</p>
                    <p>{t('l3_p2')}</p>
                    <p>{t('l3_p3')}</p>
                    <p>{t('l3_p4')}</p>
                  </div>
                </InfoCard>

                <div className="bg-gradient-to-br from-slate-900 to-slate-950 p-8 rounded-2xl border border-slate-700 shadow-xl">
                  <SectionTitle icon={Target} color="text-amber-400" title={t('l3_sortTitle')} />
                  <p className="text-white font-bold text-xl mb-6 leading-relaxed">{t('l3_sortSub')}</p>
                  
                  <div className="bg-rose-950/50 p-3 rounded-xl text-center text-lg font-bold font-mono uppercase mb-6 border border-rose-500/50 tracking-widest text-rose-400">⬆️ {t('l3_weak')} ⬆️</div>
                  
                  <div className="space-y-4">
                    {passwords.map((p, i) => {
                      const isCorrectPos = checked && p.id === correctOrder[i];
                      const isWrongPos = checked && p.id !== correctOrder[i];
                      return (
                        <div key={p.id} className={`p-4 md:p-6 border rounded-xl flex justify-between items-center transition-all ${isCorrectPos ? 'bg-gradient-to-r from-emerald-900 to-emerald-800 border-emerald-500 text-emerald-300' : isWrongPos ? 'bg-gradient-to-r from-rose-900 to-rose-800 border-rose-500 text-rose-300' : 'bg-slate-900 border-slate-700 text-white'} shadow-sm`}>
                          <div className="flex flex-col min-w-0 flex-1 pr-4">
                            <p className={`font-bold font-mono text-xl md:text-2xl tracking-widest break-all`}>{p.text}</p>
                            {isSorted && checked && <p className="text-slate-300 font-normal text-lg mt-1 flex items-center gap-2"><Lock size={18}/> {t('l3_time')} <span className="text-cyan-300">{p.time}</span></p>}
                          </div>
                          <div className="flex gap-2 flex-shrink-0">
                            <button onClick={() => move(i, -1)} disabled={i === 0 || checked} className="p-3 bg-slate-800 hover:bg-slate-700 rounded-xl border border-slate-600 disabled:opacity-30 touch-manipulation active:scale-90 transition-transform"><ArrowUp size={24} className="text-white"/></button>
                            <button onClick={() => move(i, 1)} disabled={i === passwords.length - 1 || checked} className="p-3 bg-slate-800 hover:bg-slate-700 rounded-xl border border-slate-600 disabled:opacity-30 touch-manipulation active:scale-90 transition-transform"><ArrowDown size={24} className="text-white"/></button>
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  <div className="bg-emerald-950/50 p-3 rounded-xl text-center text-lg font-bold font-mono uppercase mt-6 border border-emerald-500/50 tracking-widest text-emerald-400">⬇️ {t('l3_strong')} ⬇️</div>

                  {!checked ? (
                    <Button onClick={() => { updateState({ checked: true }); }} className="mt-8" variant="primary">{t('login')}</Button>
                  ) : !isSorted ? (
                     <div className="mt-8 space-y-6">
                       <div className="p-6 bg-gradient-to-r from-rose-900 to-rose-800 border border-rose-500 rounded-xl text-rose-300 font-bold font-mono text-2xl uppercase text-center shadow-lg break-words">
                         {t('l3_fbWrong')}
                       </div>
                       <Button onClick={() => updateState({ checked: false })} variant="secondary">{t('tryAgain')}</Button>
                     </div>
                  ) : (
                    <div className="mt-8 p-8 bg-gradient-to-r from-emerald-900 to-emerald-800 border border-emerald-500 rounded-xl text-emerald-300 font-bold font-mono text-2xl uppercase tracking-widest text-center shadow-lg break-words">
                       {t('l3_fbRight')}
                    </div>
                  )}
                </div>

                {isSorted && checked && (
                  <div className="bg-gradient-to-br from-slate-900 to-cyan-950 p-8 rounded-2xl border border-cyan-500/50 shadow-xl mt-8">
                    <SectionTitle icon={Target} color="text-cyan-400" title={t('l3_analysisTitle')} />
                    <p className="text-white font-bold text-xl mb-6 leading-relaxed">{t('l3_analysisSub')}</p>
                    <div className="space-y-4">
                      {analysisOptions.map(o => (
                        <button 
                          key={o.id} 
                          onClick={() => {
                            if (analysisDone) return;
                            let s = selections.includes(o.id) ? selections.filter(x => x !== o.id) : [...selections, o.id];
                            updateState({ selections: s });
                          }}
                          className={`w-full p-6 border rounded-xl text-left font-normal text-lg flex items-start gap-4 transition-all touch-manipulation break-words shadow-md ${selections.includes(o.id) ? 'bg-gradient-to-r from-cyan-900 to-cyan-800 border-cyan-500 text-cyan-100' : 'bg-slate-900 border-slate-700 text-slate-200 hover:bg-slate-800'}`}
                        >
                          <div className={`w-8 h-8 mt-1 rounded border flex-shrink-0 flex items-center justify-center ${selections.includes(o.id) ? 'border-cyan-400 bg-cyan-500' : 'border-slate-500 bg-slate-800'}`}>
                            {selections.includes(o.id) && <Check size={20} className="text-slate-950 font-bold" />}
                          </div>
                          <span className="flex-1">{o.text}</span>
                        </button>
                      ))}
                    </div>
                    {!analysisDone ? (
                      <>
                        {feedback && <div className="mt-8 p-6 bg-gradient-to-r from-rose-900 to-rose-800 border border-rose-500 rounded-xl text-rose-300 font-bold font-mono text-2xl uppercase text-center shadow-lg break-words">{feedback}</div>}
                        <Button onClick={() => {
                          const correctIds = analysisOptions.filter(x => x.c).map(x => x.id);
                          const isCorrect = selections.length === correctIds.length && selections.every(x => correctIds.includes(x));
                          if (isCorrect) updateState({ analysisDone: true, feedback: "" });
                          else updateState({ feedback: t('l3_analysisWrong') });
                        }} className="mt-8" variant="primary">{t('check')}</Button>
                      </>
                    ) : (
                      <div className="mt-8 space-y-8">
                         <div className="p-8 bg-gradient-to-r from-emerald-900 to-emerald-800 border border-emerald-500 rounded-xl text-emerald-300 font-bold font-mono text-2xl uppercase tracking-widest text-center shadow-lg break-words">
                            {t('l3_analysisRight')}
                         </div>
                         <Button onClick={onComplete} variant="success" icon={Lock}>{t('finish')}</Button>
                      </div>
                    )}
                  </div>
                )}
              </div>
            </ScreenWrapper>
          );
        };

        // --- Level 4 ---
        const Level4 = ({ state, updateState, onBack, onComplete, agentNames, t, lang, onLangToggle, onTeacherCode }) => {
          const { step = 0, showAB = false, abDone = false, feedback = "", isError = false } = state;
          const questions = t('l4_qs');

          const handleAns = (c) => {
            if (c) {
              updateState({ feedback: t('correct'), isError: false });
              setTimeout(() => {
                if (step + 1 === questions.length) {
                  updateState({ feedback: t('l4_checkPassed'), isError: false, showAB: true });
                  setTimeout(() => { if(!abDone) updateState({ showAB: true }); }, 3000);
                } else {
                  updateState({ step: step + 1, feedback: "" });
                }
              }, 1500);
            } else {
              updateState({ feedback: t('l4_fbWrong'), isError: true });
              setTimeout(() => updateState({ feedback: "" }), 1500);
            }
          };

          return (
            <ScreenWrapper 
              title={t('l4_title')} 
              onBack={onBack} 
              agentNames={agentNames} 
              t={t} 
              lang={lang} 
              onLangToggle={onLangToggle} 
              onTeacherCode={onTeacherCode}
              modal={
                <WorksheetModal isOpen={showAB} onClose={() => updateState({ showAB: false, abDone: true })} t={t}>
                  {t('l4_ab')}
                </WorksheetModal>
              }
            >
              <div className="space-y-8 max-w-4xl mx-auto w-full">
                <InfoCard title={t('l4_infoHead')} t={t}>
                  <div className="space-y-6">
                    <p className="font-bold font-mono text-cyan-400 uppercase text-2xl break-words">{t('l4_sub')}</p>
                    <ul className="space-y-4 bg-slate-900 p-8 rounded-xl border border-cyan-500/30 shadow-inner text-lg">
                      <li className="flex items-start gap-4"><CheckCircle size={24} className="text-emerald-400 flex-shrink-0 mt-1" /> <span className="break-words">{t('l4_li1')}</span></li>
                      <li className="flex items-start gap-4"><CheckCircle size={24} className="text-emerald-400 flex-shrink-0 mt-1" /> <span className="break-words">{t('l4_li2')}</span></li>
                      <li className="flex items-start gap-4"><CheckCircle size={24} className="text-emerald-400 flex-shrink-0 mt-1" /> <span className="break-words">{t('l4_li3')}</span></li>
                      <li className="flex items-start gap-4"><CheckCircle size={24} className="text-emerald-400 flex-shrink-0 mt-1" /> <span className="break-words">{t('l4_li4')}</span></li>
                      <li className="flex items-start gap-4"><CheckCircle size={24} className="text-emerald-400 flex-shrink-0 mt-1" /> <span className="break-words">{t('l4_li5')}</span></li>
                    </ul>
                  </div>
                </InfoCard>

                {!showAB && !abDone ? (
                  <div className="bg-gradient-to-br from-slate-900 to-slate-950 p-8 rounded-2xl border border-slate-700 shadow-xl">
                    <SectionTitle icon={HelpCircle} color="text-amber-400" title={t('l4_check')} >
                       <span className="text-amber-400 ml-2">{step + 1}/5</span>
                    </SectionTitle>
                    <div className="text-white font-bold text-xl mb-6 leading-relaxed">
                      {questions[step].q}
                    </div>
                    <div className="grid grid-cols-1 gap-4">
                      {questions[step].opts.map((o, i) => (
                        <button key={i} onClick={() => handleAns(o.c)} className="p-6 bg-slate-900 hover:bg-slate-800 border border-slate-600 rounded-xl font-normal text-lg text-white active:scale-95 transition-all touch-manipulation break-words text-left shadow-md">
                          {o.t}
                        </button>
                      ))}
                    </div>
                    {feedback && (
                      <div className={`mt-8 p-6 rounded-xl border text-center font-bold font-mono text-2xl uppercase tracking-widest break-words ${isError ? 'bg-gradient-to-r from-rose-900 to-rose-800 border-rose-500 text-rose-300 shadow-lg' : 'bg-gradient-to-r from-emerald-900 to-emerald-800 border-emerald-500 text-emerald-300 shadow-lg'}`}>
                        {feedback}
                      </div>
                    )}
                  </div>
                ) : (
                  <div className="space-y-8 text-center">
                    <div className="p-10 bg-gradient-to-r from-emerald-900 to-emerald-800 border border-emerald-500 rounded-2xl text-emerald-300 font-bold font-mono text-2xl uppercase tracking-widest shadow-xl leading-relaxed break-words">
                       {t('l4_checkPassed')}
                    </div>
                    {abDone && <Button onClick={onComplete} variant="success" icon={Lock}>{t('finish')}</Button>}
                  </div>
                )}
              </div>
            </ScreenWrapper>
          );
        };

        // --- Level 5 ---
        const Level5 = ({ state, updateState, onBack, onComplete, agentNames, t, lang, onLangToggle, onTeacherCode }) => {
          const { trickPhase = 'info', taskIdx = 0, input = "", feedback = "", isError = false, showAB = false, abDone = false, failCount = 0 } = state;
          
          const tasks = t('l5_tasks');
          const currentTask = tasks[taskIdx] || tasks[0];
          const currentTrick = currentTask.trick;

          useEffect(() => {
            if (trickPhase === 'summary' && !abDone && !showAB) {
               const timer = setTimeout(() => {
                  updateState({ showAB: true });
               }, 3000);
               return () => clearTimeout(timer);
            }
          }, [trickPhase, abDone, showAB, updateState]);

          const check = () => {
            if (input.trim() === currentTask.c) {
              updateState({ feedback: t('correct'), isError: false, failCount: 0 });
              setTimeout(() => {
                const nextIdx = taskIdx + 1;
                if (nextIdx >= tasks.length) {
                  updateState({ trickPhase: 'transition', feedback: "", input: "" }); 
                } else if (tasks[nextIdx].trick !== currentTrick) {
                  updateState({ trickPhase: 'transition', feedback: "", input: "" });
                } else {
                  updateState({ taskIdx: nextIdx, feedback: "", input: "" });
                }
              }, 1500);
            } else {
              let f = "";
              if (failCount === 0) f = t('l5_fb_read');
              else if (failCount === 1) f = currentTrick === 4 ? t('l5_fb_all') : t('l5_fb_trick').replace('{0}', currentTrick);
              else f = t('l5_fb_hint').replace('{0}', currentTask.hint);
              updateState({ feedback: f, isError: true, failCount: failCount + 1 });
            }
          };

          if (trickPhase === 'summary') {
            return (
              <ScreenWrapper 
                title={t('l5_sumTitle')} 
                agentNames={agentNames} 
                t={t} 
                lang={lang} 
                onLangToggle={onLangToggle} 
                onTeacherCode={onTeacherCode}
                modal={
                  <WorksheetModal isOpen={showAB} onClose={() => updateState({ showAB: false, abDone: true })} t={t}>
                    {t('l5_ab')}
                  </WorksheetModal>
                }
              >
                <div className="space-y-8 max-w-4xl mx-auto w-full">
                  <InfoCard title={`${t('l5_trick')} 1: ${t('l5_t1')}`} t={t}>
                    <p className="font-normal">{t('l5_t1_p1')}</p>
                    <p className="mt-4">{t('l5_t1_p2')} {t('l5_t1_p3')}</p>
                    <p className="mt-6 font-bold font-mono text-cyan-400 bg-cyan-950/80 border-l-4 border-cyan-500 p-4 rounded-r-xl text-lg shadow-md break-words">{t('l5_ex')} {t('l5_t1_ex')}</p>
                  </InfoCard>
                  <InfoCard title={`${t('l5_trick')} 2: ${t('l5_t2')}`} t={t}>
                    <p>{t('l5_t2_p2')}</p>
                    <ul className="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-6 text-emerald-400 font-bold font-mono text-lg">
                      <li className="bg-emerald-950/80 p-4 border-l-4 border-emerald-500 rounded-r-xl break-words shadow-sm">{t('l5_t2_r1')}</li>
                      <li className="bg-emerald-950/80 p-4 border-l-4 border-emerald-500 rounded-r-xl break-words shadow-sm">{t('l5_t2_r2')}</li>
                      <li className="bg-emerald-950/80 p-4 border-l-4 border-emerald-500 rounded-r-xl break-words shadow-sm">{t('l5_t2_r3')}</li>
                      <li className="bg-emerald-950/80 p-4 border-l-4 border-emerald-500 rounded-r-xl break-words shadow-sm">{t('l5_t2_r4')}</li>
                    </ul>
                  </InfoCard>
                  <InfoCard title={`${t('l5_trick')} 3: ${t('l5_t3')}`} t={t}>
                    <p>{t('l5_t3_p4')}</p>
                    <p className="mt-6 font-bold font-mono text-cyan-400 border-l-4 border-cyan-500 bg-cyan-950/80 p-4 rounded-r-xl text-lg shadow-md break-words">{t('l5_ex')} {t('l5_t3_ex')}</p>
                  </InfoCard>
                  {abDone && <Button onClick={onComplete} variant="success" icon={Lock}>{t('finish')}</Button>}
                </div>
              </ScreenWrapper>
            );
          }

          if (trickPhase === 'transition') {
            let btnText = t('next');
            if (taskIdx === 1) btnText = `${t('next')} ${t('l5_trick')} 2`;
            else if (taskIdx === 3) btnText = `${t('next')} ${t('l5_trick')} 3`;
            else if (taskIdx === 4) btnText = t('l5_btn_test');
            else if (taskIdx >= 6) btnText = t('l5_btn_proto');

            return (
              <ScreenWrapper title={`${t('l5_title')} - ${t('l5_trick')} ${currentTrick}`} agentNames={agentNames} t={t} lang={lang} onLangToggle={onLangToggle} onTeacherCode={onTeacherCode}>
                <div className="flex flex-col items-center justify-center py-16 space-y-10">
                  <Award size={80} className="text-emerald-400 drop-shadow-lg" />
                  <h2 className="text-2xl font-bold font-mono text-emerald-400 text-center uppercase tracking-widest leading-relaxed break-words">{t('l5_mastered')}</h2>
                  <Button 
                    onClick={() => {
                      if (taskIdx >= 6) updateState({ trickPhase: 'summary' });
                      else updateState({ taskIdx: taskIdx + 1, trickPhase: 'info' });
                    }} 
                    variant="success" 
                    className="max-w-xl mt-8"
                  >
                    {btnText} <ArrowRight size={24} />
                  </Button>
                </div>
              </ScreenWrapper>
            );
          }

          let trickName = currentTrick === 1 ? t('l5_t1') : currentTrick === 2 ? t('l5_t2') : currentTrick === 3 ? t('l5_t3') : t('l5_t4');

          return (
            <ScreenWrapper title={t('l5_title')} onBack={onBack} agentNames={agentNames} t={t} lang={lang} onLangToggle={onLangToggle} onTeacherCode={onTeacherCode}>
              <div className="space-y-8 max-w-4xl mx-auto w-full">
                {(trickPhase === 'info' || trickPhase === 'task') && (
                  <div className="space-y-8">
                    <InfoCard title={`${currentTrick < 4 ? t('l5_trick') : ''} ${currentTrick < 4 ? currentTrick + ':' : ''} ${trickName}`} t={t}>
                      {currentTrick === 1 && (
                        <div className="space-y-4">
                          <p>{t('l5_t1_p1')}</p>
                          <p>{t('l5_t1_p2')}</p>
                          <p>{t('l5_t1_p3')}</p>
                          <p className="mt-8 text-cyan-500 font-bold font-mono uppercase tracking-widest border-b border-cyan-500/30 pb-2">{t('l5_ex')}</p>
                          <p className="font-bold font-mono text-white text-2xl mt-4 break-words">{t('l5_t1_ex')}</p>
                        </div>
                      )}
                      {currentTrick === 2 && (
                        <div className="space-y-4">
                          <p>{t('l5_t2_p1')}</p>
                          <p>{t('l5_t2_p2')}</p>
                          <p className="mt-8 text-cyan-500 font-bold font-mono uppercase tracking-widest border-b border-cyan-500/30 pb-2">{t('l5_ex')}</p>
                          <ul className="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-4 text-emerald-400 font-bold font-mono text-lg">
                            <li className="bg-emerald-950/80 p-4 rounded-xl border border-emerald-500/50 break-words shadow-sm">{t('l5_t2_r1')}</li>
                            <li className="bg-emerald-950/80 p-4 rounded-xl border border-emerald-500/50 break-words shadow-sm">{t('l5_t2_r2')}</li>
                            <li className="bg-emerald-950/80 p-4 rounded-xl border border-emerald-500/50 break-words shadow-sm">{t('l5_t2_r3')}</li>
                            <li className="bg-emerald-950/80 p-4 rounded-xl border border-emerald-500/50 break-words shadow-sm">{t('l5_t2_r4')}</li>
                          </ul>
                        </div>
                      )}
                      {currentTrick === 3 && (
                        <div className="space-y-4">
                          <p>{t('l5_t3_p1')}</p>
                          <p className="mt-4">{t('l5_t3_p3')}</p>
                          <p>{t('l5_t3_p4')}</p>
                          <p className="mt-8 text-cyan-500 font-bold font-mono uppercase tracking-widest border-b border-cyan-500/30 pb-2">{t('l5_ex')}</p>
                          <p className="font-bold font-mono text-white border-l-4 border-cyan-500 bg-cyan-950/80 p-4 rounded-r-xl text-2xl mt-4 break-words shadow-sm">{t('l5_t3_ex')}</p>
                        </div>
                      )}
                      {currentTrick === 4 && (
                        <div className="space-y-4">
                          <p>{t('l5_t4_p1')}</p>
                          <p>{t('l5_t4_p2')}</p>
                          <ul className="space-y-4 mt-6 font-normal text-lg bg-slate-900 p-6 rounded-xl border border-slate-700 shadow-inner">
                            <li className="flex gap-4 items-start"><Check size={24} className="text-cyan-400 flex-shrink-0 mt-1"/> <span className="break-words">{t('l5_t4_l1')}</span></li>
                            <li className="flex gap-4 items-start"><Check size={24} className="text-cyan-400 flex-shrink-0 mt-1"/> <span className="break-words">{t('l5_t4_l2')}</span></li>
                            <li className="flex gap-4 items-start"><Check size={24} className="text-cyan-400 flex-shrink-0 mt-1"/> <span className="break-words">{t('l5_t4_l3')}</span></li>
                          </ul>
                        </div>
                      )}
                    </InfoCard>
                  </div>
                )}

                {trickPhase === 'info' && (
                   <Button onClick={() => updateState({ trickPhase: 'task' })} variant="primary">{t('l5_toExercises')}</Button>
                )}

                {trickPhase === 'task' && (
                  <div className="bg-gradient-to-br from-slate-900 to-slate-950 p-8 rounded-2xl border border-slate-700 shadow-xl">
                    <SectionTitle icon={Target} color="text-cyan-400" title={currentTask.name} />
                    <div className="text-white text-center font-bold text-xl mb-6 leading-relaxed">
                      "{currentTask.s}"

            if (countdown === null) return;
            if (countdown > 0) {
              const timer = setTimeout(() => setCountdown(countdown - 1), 1000);
              return () => clearTimeout(timer);
            } else {
              setPlaying(true);
              setCountdown(null);
            }
          }, [countdown]);

          const triggerMistake = (lane) => {
            isPausedRef.current = true;
            setFlash(prev => { let n = [...prev]; n[lane] = true; return n; });

              isPausedRef.current = false;
              setFlash([false, false]);

            if (!playing) return;
            
            const timer = setInterval(() => {

              timeRef.current += 1;
              setTime(timeRef.current);
            }, 1000);

            const loop = setInterval(() => {
              if(isPausedRef.current) return;

              setItems(prev => {
                return prev.map((lane, lIdx) => lane.map(i => ({...i, y: i.y + i.speed})).filter(i => {
                  if (i.y > 105) {

                       setLives(lv => { let nl = [...lv]; nl[lIdx] -= 1; return nl; });
                       triggerMistake(lIdx);

                    return false;

              const weakTexts = lang === 'de' ? textsDE_weak : textsRU_weak;
              const strongTexts = lang === 'de' ? textsDE_strong : textsRU_strong;

              const currentSpeed = 0.8 + (timeRef.current * 0.02); 
              
              const generateItem = () => {
                const isWeak = Math.random() > 0.4;
                const texts = isWeak ? weakTexts : strongTexts;
                return { 
                  id: Math.random(), 
                  x: Math.random() * 70 + 15, 
                  y: -10, 
                  text: texts[Math.floor(Math.random() * texts.length)], 
                  isWeak, 
                  speed: currentSpeed 
                };

                n[0] = [...n[0], generateItem()];

                return n;

              spawnTimeout = setTimeout(spawn, nextDelay);

            return () => clearTimeout(spawnTimeout);

                          <div className="bg-slate-950 p-4 rounded-xl border border-slate-800 flex items-center justify-between gap-2">
                            <div className="text-white font-bold font-mono text-lg text-center w-1/3 break-words uppercase">{p1Name}</div>
                            <button onClick={() => setSwappedSides(!swappedSides)} className="p-3 bg-slate-800 hover:bg-slate-700 border border-cyan-500/50 rounded-xl text-cyan-400 active:scale-95 flex-shrink-0 transition-all touch-manipulation shadow-md" title={t('l10_swapSides')}>
                              <ArrowRight size={24} className="rotate-180 inline -ml-2" />
                              <ArrowRight size={24} className="inline -ml-2" />
                            </button>
                            <div className="text-white font-bold font-mono text-lg text-center w-1/3 break-words uppercase">{p2Name}</div>
                          </div>
                          <p className="text-center text-slate-500 font-bold font-mono text-lg uppercase tracking-widest break-words">{t('l10_swapSides')}</p>
                        </div>
                      </>
                    )}
                  </div>
                </div>
              </ScreenWrapper>
            );
          }

          return (
            <div className="fixed inset-0 bg-slate-950 z-[200] flex overflow-hidden select-none touch-none">
              
              {/* Grid Background für Minigame */}
              <div className="absolute inset-0 opacity-40 pointer-events-none" style={{ backgroundImage: 'linear-gradient(rgba(6, 182, 212, 0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(6, 182, 212, 0.1) 1px, transparent 1px)', backgroundSize: '30px 30px' }}></div>

              {countdown !== null && (
                <div className="absolute inset-0 z-[300] bg-slate-950/80 flex items-center justify-center backdrop-blur-md">
                  <span className="text-2xl font-bold font-mono text-cyan-400 uppercase tracking-[0.5em] animate-pulse drop-shadow-lg" style={{ transform: 'scale(3)' }}>{countdown > 0 ? countdown : "GO!"}</span>
                </div>
              )}

              {[...Array(mode === 'vs' ? 2 : 1)].map((_, laneIdx) => (
                <div key={laneIdx} className={`relative flex-1 border-slate-800 transition-colors duration-150 ${laneIdx === 0 && mode === 'vs' ? 'border-r' : ''} ${flash[laneIdx] ? 'bg-rose-950/80' : ''}`}>
                  <div className="absolute top-6 left-6 right-6 z-[210] flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 pointer-events-none">
                     <div className="flex flex-col gap-3 min-w-0">
                        {mode === 'vs' && (
                          <div className="bg-slate-900/90 px-4 py-2 rounded-xl border border-slate-700 shadow-md inline-block max-w-full">
                            <span className="text-cyan-400 font-bold font-mono text-lg uppercase tracking-widest truncate block">{laneIdx === 0 ? p1Name : p2Name}</span>
                          </div>
                        )}
                        <div className="bg-slate-900/90 p-4 rounded-xl border border-cyan-500/50 text-cyan-400 font-bold font-mono text-2xl shadow-md inline-block uppercase whitespace-nowrap">
                          {t('l10_score')} {score[laneIdx]}
                        </div>
                     </div>
                     <div className="flex gap-2 bg-slate-900/90 p-4 rounded-xl border border-rose-500/30 shadow-md self-end sm:self-auto flex-shrink-0">
                       {[...Array(3)].map((_, i) => <Heart key={i} size={24} className={`${i < lives[laneIdx] ? 'text-rose-500 fill-current drop-shadow-md' : 'text-slate-800'}`} />)}
                     </div>
                  </div>
                  
                  {time === 30 && (
                    <div className="absolute top-1/2 left-0 w-full bg-amber-500/90 border-y-2 border-amber-300 text-slate-900 font-bold font-mono py-6 text-center transform -translate-y-1/2 -rotate-12 pointer-events-none text-2xl uppercase tracking-widest z-[220] shadow-xl">
                       {t('l10_camo')}
                    </div>
                  )}

                  <div className="h-full w-full relative">
                    {items[laneIdx].map(i => (
                      <button 
                        key={i.id} 
                        onPointerDown={() => clickItem(laneIdx, i.id, i.isWeak)}
                        style={{ left: `${i.x}%`, top: `${i.y}%` }}
                        className={`absolute p-4 rounded-xl border-2 font-bold font-mono text-lg tracking-wider transform -translate-x-1/2 shadow-md transition-transform active:scale-90 touch-manipulation whitespace-nowrap transform-gpu
                        ${isCamouflage ? 'bg-slate-800 text-slate-300 border-slate-600' : (i.isWeak ? 'bg-rose-950/80 text-rose-400 border-rose-500/50' : 'bg-emerald-950/80 text-emerald-400 border-emerald-500/50')}`}
                      >
                        {i.text}
                      </button>
                    ))}
                  </div>
                  <div className="absolute bottom-0 w-full h-16 bg-cyan-950/80 border-t border-cyan-500/50 flex items-center justify-center font-bold font-mono text-2xl text-cyan-500 uppercase tracking-widest shadow-inner z-[230] backdrop-blur-md">
                    {t('l10_server')}
                  </div>
                </div>
              ))}

              {!playing && countdown === null && (
                <div className="absolute inset-0 bg-slate-950/95 backdrop-blur-xl flex flex-col items-center justify-center z-[250] p-6 text-center overflow-y-auto">
                  <div className="my-auto w-full max-w-2xl py-8">
                    <h2 className="text-2xl font-bold font-mono text-rose-500 mb-8 uppercase tracking-[0.3em] drop-shadow-lg border-b border-rose-500/30 pb-4 break-words">{t('l10_gameover')}</h2>
                    
                    <div className="bg-gradient-to-br from-slate-900 to-slate-950 p-8 rounded-2xl border border-slate-700 mb-8 w-full shadow-2xl">
                      {mode === 'vs' ? (
                        <div className="space-y-8">
                           <p className="text-cyan-400 font-bold font-mono text-2xl uppercase tracking-widest border-b border-slate-800 pb-4 break-words">{t('l10_endstand')}</p>
                           <div className="flex justify-between items-center text-2xl font-bold font-mono text-white bg-slate-950 p-4 rounded-xl border border-slate-800 gap-4">
                             <span className="truncate uppercase min-w-0">{p1Name}</span> <span className="text-cyan-400 flex-shrink-0">{score[0]}</span>
                           </div>
                           <div className="flex justify-between items-center text-2xl font-bold font-mono text-white bg-slate-950 p-4 rounded-xl border border-slate-800 gap-4">
                             <span className="truncate uppercase min-w-0">{p2Name}</span> <span className="text-cyan-400 flex-shrink-0">{score[1]}</span>
                           </div>
                           <div className="bg-emerald-950/50 p-6 rounded-xl border border-emerald-500/50 mt-8">
                             <p className="text-emerald-400 text-2xl font-bold font-mono uppercase tracking-widest drop-shadow-md break-words">
                               {score[0] === score[1] ? t('l10_tie') : (score[0] > score[1] ? p1Name : p2Name) + ' ' + t('l10_wins')}
                             </p>
                           </div>
                        </div>
                      ) : (
                        <div className="py-6 space-y-8">
                          <p className="text-cyan-400 font-bold font-mono text-2xl uppercase tracking-widest break-words">{t('l10_score')}</p>
                          <p className="text-2xl font-bold font-mono text-white drop-shadow-lg my-6" style={{ transform: 'scale(3)' }}>{score[0]}</p>
                        </div>
                      )}
                    </div>
                    
                    <div className="flex flex-col gap-4 max-w-md mx-auto w-full">
                       <Button onClick={restartGame} variant="primary" icon={PlayCircle}>{t('l10_playAgain')}</Button>
                       {agentNames[1] && <Button onClick={goSetup} variant="secondary" icon={Target}>{t('l10_changeMode')}</Button>}
                       <Button onClick={onBack} variant="secondary" icon={Lock}>{t('finish')}</Button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        };

        // --- App Root & State ---
        const App = () => {
          const [view, setView] = useState('welcome');
          const [agentNames, setAgentNames] = useState(["", ""]);
          const [maxUnlocked, setMaxUnlocked] = useState(1);
          const [activeLevel, setActiveLevel] = useState(1);
          const [levelStates, setLevelStates] = useState({});
          const [lang, setLang] = useState('de');

          const t = (key) => translations[lang][key] || key;
          const updateState = (id, s) => setLevelStates(prev => ({ ...prev, [id]: { ...prev[id], ...s } }));

          const handleTeacherCode = (code) => {
            if (code === "download") {
              const htmlContent = `<!DOCTYPE html>\n<html>\n<head>\n<meta charset="utf-8">\n<title>Mission Sicheres Passwort</title>\n</head>\n<body>\n${document.documentElement.innerHTML}\n</body>\n</html>`;
              const blob = new Blob([htmlContent], { type: 'text/html' });
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');
              a.href = url;
              a.download = 'Mission_Sicheres_Passwort_Source.html';
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              URL.revokeObjectURL(url);
              alert("Lernpfad-Code wurde als HTML heruntergeladen!");
            } else if (code === "KleallesFrei") {
              setMaxUnlocked(10);
              alert("ZUTRITT ERTEILT: Alle Akten sind nun frei!");
            } else if (code === "KleLoesung") {
              updateState(activeLevel, { 
                answered: true, 
                gameWon: true, 
                solved: true, 
                abDone: true, 
                worksheetDone: true,
                checked: true,
                analysisDone: true,
                trickPhase: 'summary'
              });
              alert("AKTUELLER SCHRITT ERFOLGREICH ÜBERBRÜCKT.");
            } else {
              alert("CODE UNGÜLTIG.");
            }
          };

          const handleSelectLevel = (id) => {
            setActiveLevel(id);
            setView('level');
          };

          const renderContent = () => {
            if (view === 'welcome') return <SetupScreen onStart={(m, n) => { setAgentNames(n); setView('overview'); }} t={t} lang={lang} onLangToggle={() => setLang(l => l === 'de' ? 'ru' : 'de')} onTeacherCode={handleTeacherCode} />;
            if (view === 'overview') return <OverviewScreen maxUnlocked={maxUnlocked} onSelectLevel={handleSelectLevel} agentNames={agentNames} t={t} lang={lang} onLangToggle={() => setLang(l => l === 'de' ? 'ru' : 'de')} onTeacherCode={handleTeacherCode} />;
            
            const id = activeLevel;
            const props = { 
              lang, 
              onLangToggle: () => setLang(l => l === 'de' ? 'ru' : 'de'), 
              t, 
              state: levelStates[id] || {}, 
              updateState: (s) => updateState(id, s), 
              onBack: () => setView('overview'), 
              onComplete: () => { setMaxUnlocked(Math.max(maxUnlocked, id + 1)); setView('overview'); }, 
              agentNames,
              onTeacherCode: handleTeacherCode
            };

            switch (id) {
              case 1: return <Level1 {...props} />;
              case 2: return <Level2 {...props} />;
              case 3: return <Level3 {...props} />;
              case 4: return <Level4 {...props} />;
              case 5: return <Level5 {...props} />;
              case 6: return <Level6 {...props} onComplete={() => { setMaxUnlocked(Math.max(maxUnlocked, 7)); setView('overview'); }} />;
              case 7: return <BonusManager {...props} />;
              case 8: return <Bonus2FA {...props} />;
              case 9: return <BonusPhishing {...props} onComplete={() => { setMaxUnlocked(Math.max(maxUnlocked, 10)); setView('cert'); }} />;
              case 10: return <Minigame onBack={() => setView('overview')} agentNames={agentNames} t={t} lang={lang} onLangToggle={props.onLangToggle} onTeacherCode={handleTeacherCode} />;
              default: return null;
            }
          };

          if (view === 'cert') return (
            <ScreenWrapper title={t('cert_title')} agentNames={agentNames} t={t} lang={lang} onLangToggle={() => setLang(l => l === 'de' ? 'ru' : 'de')}>
              <div className="w-full px-4 mt-12 relative z-10">
                <div className="bg-gradient-to-br from-slate-900 to-slate-950 border border-cyan-500/50 rounded-2xl p-8 md:p-12 max-w-4xl mx-auto text-center relative shadow-xl">
                  
                  <div className="absolute top-[-40px] left-1/2 transform -translate-x-1/2">
                    <div className="bg-gradient-to-br from-cyan-900 to-cyan-800 p-4 rounded-xl border border-cyan-500/50 shadow-md">
                      <Award size={48} className="text-cyan-400" />
                    </div>
                  </div>
                  
                  <h2 className="text-2xl font-bold font-mono text-cyan-400 uppercase tracking-widest mt-12 mb-6 pb-4 border-b border-slate-800 break-words">{t('cert_title')}</h2>
                  <p className="text-slate-400 font-bold font-mono tracking-[0.2em] uppercase mb-8 text-lg break-words">{t('cert_auth')}</p>
                  
                  <p className="text-lg font-normal text-slate-200 mb-8 break-words">{t('cert_conf')}</p>
                  
                  <div className="flex flex-wrap justify-center gap-4 mb-8">
                    {agentNames.map(n => n && (
                      <span key={n} className="text-2xl font-bold font-mono text-emerald-400 bg-emerald-950/50 px-6 py-3 rounded-xl border border-emerald-500/50 uppercase tracking-widest shadow-md break-all">{n}</span>
                    ))}
                    {!agentNames[0] && <span className="text-2xl font-bold font-mono text-emerald-400 bg-emerald-950/50 px-6 py-3 rounded-xl border border-emerald-500/50 uppercase tracking-widest shadow-md break-words">{t('cert_unknownAgent')}</span>}
                  </div>
                  
                  <p className="text-lg font-normal text-slate-200 mb-12 max-w-2xl mx-auto leading-relaxed break-words">
                    {t('cert_text')}
                  </p>
                  
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-8 border-t border-slate-800 pt-8 mt-8 max-w-2xl mx-auto">
                      <div>
                         <div className="font-bold font-mono text-cyan-400 text-2xl mb-2 uppercase tracking-widest break-words">{t('cert_sysadmin')}</div>
                         <p className="text-lg font-normal text-slate-500 uppercase tracking-widest break-words">{t('cert_examiner')}</p>
                      </div>
                      <div>
                         <div className="font-bold font-mono text-cyan-400 text-2xl mb-2 uppercase tracking-widest break-words">{new Date().toLocaleDateString(lang === 'de' ? 'de-DE' : 'ru-RU')}</div>
                         <p className="text-lg font-normal text-slate-500 uppercase tracking-widest break-words">{t('cert_date')}</p>
                      </div>
                  </div>
                </div>
                
                <div className="mt-12 text-center max-w-md mx-auto">
                   <Button onClick={() => setView('overview')} variant="secondary" icon={Terminal}>{t('cert_back')}</Button>
                </div>
              </div>
            </ScreenWrapper>
          );

          return (
            <div className="bg-slate-950 min-h-screen">
              <style>{`
                .next-level-glow {
                  animation: superPulse 1.5s infinite ease-in-out;
                  z-index: 10;
                }
                @keyframes superPulse {
                  0%, 100% { box-shadow: 0 0 15px rgba(6,182,212,0.4), inset 0 0 10px rgba(6,182,212,0.2); border-color: rgba(6,182,212, 0.6); transform: scale(1); }
                  50% { box-shadow: 0 0 40px rgba(6,182,212,1), inset 0 0 20px rgba(6,182,212,0.5); border-color: rgba(6,182,212, 1); transform: scale(1.02); }
                }
              `}</style>
              {renderContent()}
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
